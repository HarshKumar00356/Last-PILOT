<!DOCTYPE html>
<html>
<head>
<title>Last Pilot</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:Arial,sans-serif; }
canvas { display:block; }
#ui { position:fixed; inset:0; pointer-events:none; z-index:5; }
#score { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:32px; font-weight:100; color:#fff; letter-spacing:4px; }
#level { position:absolute; top:58px; left:50%; transform:translateX(-50%); font-size:11px; color:rgba(255,255,255,.3); letter-spacing:6px; }
#lives { position:absolute; top:22px; right:20px; font-size:18px; }
#overlay { position:fixed; inset:0; z-index:10; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; cursor:pointer; }
#overlay.hide { display:none; }

#ov-title { font-size:clamp(42px,10vw,88px); font-weight:100; letter-spacing:16px; color:#fff; text-transform:uppercase; opacity:0; animation:dissolve 1.8s ease-out 0.3s forwards; }
#ov-alien  { font-size:clamp(48px,12vw,96px); opacity:0; margin:clamp(18px,4vw,36px) 0; animation:risein 1s ease-out 2.4s forwards, alienFloat 3s ease-in-out 3.4s infinite; }

@keyframes alienFloat {
  0%,100% { transform:translateY(0px) scale(1);    }
  50%     { transform:translateY(-18px) scale(1.08); }
}
#ov-hint   { font-size:clamp(9px,1.8vw,12px); color:rgba(255,255,255,.32); letter-spacing:3px; opacity:0; margin-bottom:clamp(14px,3vw,24px); animation:risein .8s ease-out 3.2s forwards; }
#ov-cta    { font-size:clamp(10px,2vw,13px); letter-spacing:4px; color:rgba(0,255,180,.8); opacity:0; animation:risein .8s ease-out 3.8s forwards, blink 2s ease-in-out 4.6s infinite; }

@keyframes dissolve {
  0%   { opacity:0; filter:blur(18px); letter-spacing:28px; }
  60%  { opacity:1; filter:blur(0px); }
  100% { opacity:1; filter:blur(0px); letter-spacing:16px; }
}
@keyframes risein {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }
/* mobile */
#jpad { position:fixed; left:24px; bottom:28px; width:90px; height:90px; border-radius:50%; border:1px solid rgba(255,255,255,.12); z-index:30; touch-action:none; }
#jknob { width:36px; height:36px; border-radius:50%; background:rgba(0,180,255,.3); border:1px solid rgba(0,200,255,.5); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; }
#firebtn { position:fixed; right:28px; bottom:38px; width:70px; height:70px; border-radius:50%; border:1px solid rgba(0,200,255,.35); background:rgba(0,200,255,.1); color:rgba(0,200,255,.7); font-size:10px; letter-spacing:2px; display:flex; align-items:center; justify-content:center; z-index:8; touch-action:none; user-select:none; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="ui">
  <div id="score">0</div>
  <div id="level">LEVEL 1</div>
  <div id="lives">❤️❤️❤️</div>
</div>

<div id="overlay">
  <div id="ov-title">Last Pilot</div>
  <div id="ov-alien">👾</div>
  <div id="ov-hint">Space to shoot · Arrow keys to move</div>
  <div id="ov-cta">Tap anywhere or press Space</div>
</div>

<div id="jpad"><div id="jknob"></div></div>
<div id="firebtn">FIRE</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

// -- RENDERER --
var canvas = document.getElementById('c');
var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000008);

var scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000008, 0.008);

var camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 300);
camera.position.set(0, 8, 22);
camera.lookAt(0, 0, 0);

window.addEventListener('resize', function() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});

// -- LIGHTS --
scene.add(new THREE.AmbientLight(0x112244, 1.5));
var dlight = new THREE.DirectionalLight(0x4488ff, 2);
dlight.position.set(5, 10, 5);
scene.add(dlight);
var rlight = new THREE.DirectionalLight(0xff3311, 0.6);
rlight.position.set(-5, -3, -8);
scene.add(rlight);

// -- STARS (warp speed) --
// Camera is at z=22 looking toward z=0 and beyond.
// Stars should travel from far away (z = -200) toward and past camera (z = 40).
var STAR_COUNT = 800;
var starPositions = new Float32Array(STAR_COUNT * 3);
var starSpeeds    = new Float32Array(STAR_COUNT);

function resetStar(i) {
  starPositions[i*3]   = (Math.random() - 0.5) * 160;  // x spread
  starPositions[i*3+1] = (Math.random() - 0.5) * 160;  // y spread
  starPositions[i*3+2] = -200 - Math.random() * 80;     // start far behind scene
  starSpeeds[i] = 2.0 + Math.random() * 4.0;
}

for (var si = 0; si < STAR_COUNT; si++) {
  resetStar(si);
  // pre-scatter z so they fill the whole tunnel on first frame
  starPositions[si*3+2] = -200 + Math.random() * 240;
}

var starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
var starMat = new THREE.PointsMaterial({ color:0xffffff, size:0.5, sizeAttenuation:true });
var starField = new THREE.Points(starGeo, starMat);
scene.add(starField);

function updateStars() {
  var pos = starGeo.attributes.position.array;
  for (var si = 0; si < STAR_COUNT; si++) {
    pos[si*3+2] += starSpeeds[si];
    if (pos[si*3+2] > 40) resetStar(si);
  }
  starGeo.attributes.position.needsUpdate = true;
}

// -- BUILD SHIP --
function makeShip() {
  var g = new THREE.Group();
  var mat = new THREE.MeshStandardMaterial({ color:0x88bbee, metalness:0.9, roughness:0.1, emissive:0x001133, emissiveIntensity:0.3 });
  var wmat = new THREE.MeshStandardMaterial({ color:0x224488, metalness:0.85, roughness:0.2 });

  // body
  var body = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.5, 3, 8), mat);
  body.rotation.x = Math.PI/2; g.add(body);

  // nose
  var nose = new THREE.Mesh(new THREE.ConeGeometry(0.25, 1.2, 8), mat);
  nose.rotation.x = -Math.PI/2; nose.position.z = -2.1; g.add(nose);

  // cockpit
  var cmat = new THREE.MeshStandardMaterial({ color:0x44aaff, transparent:true, opacity:0.8, emissive:0x0055cc, emissiveIntensity:0.5, roughness:0 });
  var cock = new THREE.Mesh(new THREE.SphereGeometry(0.35, 10, 7, 0, Math.PI*2, 0, Math.PI*0.5), cmat);
  cock.rotation.x = Math.PI; cock.position.set(0, 0.22, -0.4); g.add(cock);

  // wings
  var wL = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.08, 1.2), wmat);
  wL.position.set(-1.1, 0, 0.4); g.add(wL);
  var wR = wL.clone(); wR.position.x = 1.1; g.add(wR);

  // engine glow
  var emat = new THREE.MeshStandardMaterial({ color:0x0044ff, emissive:0x0033ff, emissiveIntensity:5 });
  var eng = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.28, 0.5, 8), emat);
  eng.rotation.x = Math.PI/2; eng.position.z = 1.7; g.add(eng);
  var elight = new THREE.PointLight(0x0088ff, 3, 6);
  elight.position.z = 2; g.add(elight);
  g.userData.elight = elight;

  g.rotation.y = Math.PI;
  return g;
}

// -- BUILD ASTEROID --
var astGeos = [];
for (var ai = 0; ai < 6; ai++) {
  var ag = new THREE.IcosahedronGeometry(1, 1);
  var ap = ag.attributes.position;
  for (var aj = 0; aj < ap.count; aj++) {
    ap.setXYZ(aj,
      ap.getX(aj) * (0.7 + Math.random()*0.3),
      ap.getY(aj) * (0.7 + Math.random()*0.3),
      ap.getZ(aj) * (0.7 + Math.random()*0.3)
    );
  }
  ag.computeVertexNormals();
  astGeos.push(ag);
}
var astMat = new THREE.MeshStandardMaterial({ color:0x887755, metalness:0.05, roughness:0.95 });
var astMatH = new THREE.MeshStandardMaterial({ color:0x2244aa, metalness:0.8, roughness:0.2, emissive:0x001133, emissiveIntensity:0.4 });

function makeAsteroid(r, hard) {
  var geo = astGeos[Math.floor(Math.random()*astGeos.length)].clone();
  geo.scale(r, r, r);
  var m = new THREE.Mesh(geo, hard ? astMatH : astMat);
  m.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
  return m;
}

// -- BUILD UFO --
function makeUFO(type) {
  var g = new THREE.Group();
  var cols = { normal:0x22bb44, fast:0xff4400, tank:0x8833ff, boss:0xff1100 };
  var col = cols[type] || cols.normal;
  var bmat = new THREE.MeshStandardMaterial({ color:col, metalness:0.75, roughness:0.25, emissive:new THREE.Color(col).multiplyScalar(0.3), emissiveIntensity:0.5 });
  var dmat = new THREE.MeshStandardMaterial({ color:0xaaddff, transparent:true, opacity:0.75, emissive:0x0044aa, emissiveIntensity:0.4, roughness:0 });

  // disk
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(1.4, 1.0, 0.3, 16), bmat));
  // dome
  var dome = new THREE.Mesh(new THREE.SphereGeometry(0.7, 12, 8, 0, Math.PI*2, 0, Math.PI*0.5), dmat);
  dome.position.y = 0.15; g.add(dome);
  // underbelly glow
  var gmat = new THREE.MeshStandardMaterial({ color:col, emissive:col, emissiveIntensity:3 });
  var belly = new THREE.Mesh(new THREE.SphereGeometry(0.55, 10, 7, 0, Math.PI*2, Math.PI*0.5, Math.PI*0.5), gmat);
  belly.position.y = -0.15; g.add(belly);
  // lights ring
  for (var li = 0; li < 8; li++) {
    var la = (Math.PI*2/8)*li;
    var lm = new THREE.Mesh(new THREE.SphereGeometry(0.08, 4, 4), gmat);
    lm.position.set(Math.cos(la)*1.3, 0, Math.sin(la)*1.3); g.add(lm);
  }
  var pl = new THREE.PointLight(col, 2.5, 6); pl.position.y = -0.3; g.add(pl);
  g.userData.col = col;

  if (type === 'boss') {
    // extra rings for boss
    var rmat = new THREE.MeshStandardMaterial({ color:0xff4400, emissive:0xff2200, emissiveIntensity:2.5 });
    var ring = new THREE.Mesh(new THREE.TorusGeometry(2.2, 0.12, 6, 32), rmat);
    ring.rotation.x = Math.PI/2; g.add(ring); g.userData.ring = ring;
    var pl2 = new THREE.PointLight(0xff4400, 4, 12); g.add(pl2);
  }
  return g;
}

// -- BULLET MESH --
var bmat = new THREE.MeshStandardMaterial({ color:0x00ffff, emissive:0x00ffff, emissiveIntensity:5 });
var bGeo = new THREE.CylinderGeometry(0.05, 0.05, 0.8, 5);
function makeBullet() {
  var g = new THREE.Group();
  var m = new THREE.Mesh(bGeo, bmat); m.rotation.x = Math.PI/2; g.add(m);
  var l = new THREE.PointLight(0x00ffff, 1.8, 3); g.add(l);
  return g;
}
// enemy bullet
var ebmat = new THREE.MeshStandardMaterial({ color:0xff4400, emissive:0xff2200, emissiveIntensity:4 });
var ebGeo = new THREE.SphereGeometry(0.16, 5, 5);
function makeEBullet() {
  var g = new THREE.Group();
  var m = new THREE.Mesh(ebGeo, ebmat); g.add(m);
  var l = new THREE.PointLight(0xff4400, 1.5, 3); g.add(l);
  return g;
}

// -- AUDIO --
var AC = null;
try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
function beep(f, t, d, v) {
  if (!AC) return;
  try {
    var o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = t || 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(v||0.15, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+d);
    o.start(); o.stop(AC.currentTime+d+0.01);
  } catch(e) {}
}
function boom(big) {
  if (!AC) return;
  try {
    var buf = AC.createBuffer(1, Math.floor(AC.sampleRate*(big?0.6:0.3)), AC.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < data.length; i++) data[i] = Math.random()*2-1;
    var s = AC.createBufferSource(), g = AC.createGain(), f = AC.createBiquadFilter();
    f.type='lowpass'; f.frequency.value = big?400:600;
    s.buffer=buf; s.connect(f); f.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(big?0.4:0.25, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, AC.currentTime+(big?0.6:0.3));
    s.start(); s.stop(AC.currentTime+(big?0.65:0.35));
  } catch(e) {}
}

// -- GAME STATE --
var STATE = 'intro'; // intro, play, over
var score = 0, lives = 3, level = 1, frame = 0;
var shipX = 0, shipZ = 0, shipInv = 0, shootCD = 0;
var ship = null;
var bullets = [], ebullets = [], enemies = [], particles = [];
var keys = {}, joyX = 0, joyY = 0, tfire = false;

// -- INPUT --
document.addEventListener('keydown', function(e) {
  keys[e.key] = true;
  if (AC && AC.state === 'suspended') AC.resume();
  if (e.key === ' ') {
    if (STATE === 'intro') beginGame();
    else if (STATE === 'over') restartGame();
    else shoot();
    e.preventDefault();
  }
});
document.addEventListener('keyup', function(e) { keys[e.key] = false; });

// joystick
var jpad = document.getElementById('jpad');
var jknob = document.getElementById('jknob');
var jActive = false, jSX = 0, jSY = 0, jTouchId = -1;

// Full canvas touch for movement (left half = move, right half = fire)
document.getElementById('c').addEventListener('touchstart', function(e) {
  if (STATE === 'intro') { beginGame(); return; }
  if (STATE === 'over') { restartGame(); return; }
  if (AC && AC.state === 'suspended') AC.resume();
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (t.clientX < window.innerWidth * 0.55) {
      // left half = joystick
      if (!jActive) {
        jActive = true; jTouchId = t.identifier;
        jSX = t.clientX; jSY = t.clientY;
        jpad.style.left = (t.clientX - 45) + 'px';
        jpad.style.bottom = (window.innerHeight - t.clientY - 45) + 'px';
        jknob.style.transform = 'translate(-50%,-50%)';
      }
    } else {
      // right half = shoot
      tfire = true;
      if (shootCD <= 0) shoot();
    }
  }
  e.preventDefault();
}, {passive:false});

document.getElementById('c').addEventListener('touchmove', function(e) {
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (t.identifier === jTouchId && jActive) {
      var dx = t.clientX - jSX, dy = t.clientY - jSY;
      var d = Math.hypot(dx, dy), mx = 50;
      var cl = Math.min(d, mx), a = Math.atan2(dy, dx);
      joyX = Math.cos(a)*(cl/mx); joyY = Math.sin(a)*(cl/mx);
      jknob.style.transform = 'translate(calc(-50% + '+Math.cos(a)*cl+'px), calc(-50% + '+Math.sin(a)*cl+'px))';
    }
  }
  e.preventDefault();
}, {passive:false});

document.getElementById('c').addEventListener('touchend', function(e) {
  for (var i = 0; i < e.changedTouches.length; i++) {
    var t = e.changedTouches[i];
    if (t.identifier === jTouchId) {
      jActive = false; joyX = 0; joyY = 0; jTouchId = -1;
      jknob.style.transform = 'translate(-50%,-50%)';
    } else {
      tfire = false;
    }
  }
}, {passive:true});

// Keep original jpad listeners as fallback
jpad.addEventListener('touchstart', function(e) {
  if (AC && AC.state === 'suspended') AC.resume();
  if (STATE !== 'play') return;
  jActive = true; jTouchId = e.touches[0].identifier;
  var r = jpad.getBoundingClientRect();
  jSX = r.left + r.width/2; jSY = r.top + r.height/2;
  e.preventDefault();
}, {passive:false});
jpad.addEventListener('touchmove', function(e) {
  if (!jActive) return;
  var t = e.touches[0];
  var dx = t.clientX - jSX, dy = t.clientY - jSY;
  var d = Math.hypot(dx, dy), mx = 38;
  var cl = Math.min(d, mx), a = Math.atan2(dy, dx);
  joyX = Math.cos(a)*(cl/mx); joyY = Math.sin(a)*(cl/mx);
  jknob.style.transform = 'translate(calc(-50% + '+Math.cos(a)*cl+'px), calc(-50% + '+Math.sin(a)*cl+'px))';
  e.preventDefault();
}, {passive:false});
jpad.addEventListener('touchend', function() {
  jActive = false; joyX = 0; joyY = 0;
  jknob.style.transform = 'translate(-50%,-50%)';
});

// tap overlay to start
var overlay = document.getElementById('overlay');
overlay.addEventListener('touchstart', function(e) {
  if (AC && AC.state === 'suspended') AC.resume();
  if (STATE === 'intro') beginGame();
  else if (STATE === 'over') restartGame();
  e.preventDefault();
}, {passive:false});
overlay.addEventListener('click', function() {
  if (AC && AC.state === 'suspended') AC.resume();
  if (STATE === 'intro') beginGame();
  else if (STATE === 'over') restartGame();
});

// fire button
var firebtn = document.getElementById('firebtn');
firebtn.addEventListener('touchstart', function(e) {
  if (AC && AC.state === 'suspended') AC.resume();
  tfire = true;
  if (STATE === 'intro') beginGame();
  else if (STATE === 'over') restartGame();
  e.preventDefault();
}, {passive:false});
firebtn.addEventListener('touchend', function() { tfire = false; });

// -- BEGIN / RESTART --
function beginGame() {
  document.getElementById('overlay').classList.add('hide');
  if (!ship) { ship = makeShip(); scene.add(ship); }
  ship.position.set(0, 0, 8);
  STATE = 'play';
  spawnWave();
}

function restartGame() {
  document.getElementById('overlay').classList.add('hide');
  clearAll();
  score = 0; lives = 3; level = 1; frame = 0;
  shipInv = 0; shootCD = 0;
  if (!ship) { ship = makeShip(); scene.add(ship); }
  ship.position.set(0, 0, 8); ship.visible = true;
  updateHUD();
  STATE = 'play';
  spawnWave();
}

function clearAll() {
  bullets.forEach(function(b) { scene.remove(b.mesh); });
  ebullets.forEach(function(b) { scene.remove(b.mesh); });
  enemies.forEach(function(e) { scene.remove(e.mesh); });
  particles.forEach(function(p) { scene.remove(p.mesh); });
  bullets = []; ebullets = []; enemies = []; particles = [];
}

// -- SPAWN WAVE --
function spawnWave() {
  clearAll();
  var isBoss = (level % 5 === 0);
  if (isBoss) {
    var bm = makeUFO('boss');
    bm.position.set(0, 0, -18);
    scene.add(bm);
    enemies.push({ mesh:bm, hp:20+level*8, maxHp:20+level*8, type:'boss', dx:0.05, shootT:0, phase:0 });
    showMsg('BOSS WAVE');
  } else {
    // asteroids
    var na = 5 + level * 2;
    for (var i = 0; i < na; i++) {
      var r = 0.7 + Math.random()*0.8;
      var hard = level > 3 && Math.random() < 0.3;
      var m = makeAsteroid(r, hard);
      m.position.set((Math.random()-0.5)*26, 0, -38 - i*6);
      scene.add(m);
      enemies.push({ mesh:m, hp:hard?3:1, type:'asteroid', r:r,
        vx:(Math.random()-0.5)*0.06, vz:0.05+Math.random()*level*0.01,
        rx:Math.random()*0.02, ry:Math.random()*0.02 });
    }
    // UFOs from level 2
    if (level >= 2) {
      var nu = Math.min(2 + level, 10);
      for (var j = 0; j < nu; j++) {
        var utype = level >= 4 && j%3===0 ? 'fast' : level >= 6 && j%4===0 ? 'tank' : 'normal';
        var um = makeUFO(utype);
        um.position.set(-8 + (j%5)*4, 0, -22 - Math.floor(j/5)*6);
        scene.add(um);
        enemies.push({ mesh:um, hp:utype==='tank'?4:1, type:'ufo', utype:utype,
          dx:0.05 + level*0.008, shootT:40+Math.random()*80, phase:Math.random()*Math.PI*2 });
      }
    }
  }
}

// -- SHOOT --
function shoot() {
  if (shootCD > 0 || !ship) return;
  shootCD = 10;
  var m = makeBullet();
  m.position.copy(ship.position);
  scene.add(m);
  bullets.push({ mesh:m, dz:-0.55 });
  beep(800, 'square', 0.07, 0.12);
}

function spawnEBullet(pos, dx, dz) {
  var m = makeEBullet();
  m.position.copy(pos);
  scene.add(m);
  ebullets.push({ mesh:m, dx:dx, dz:dz });
}

// -- PARTICLES --
var pmat = new THREE.MeshBasicMaterial({ color:0xff8800, transparent:true });
var pgeo = new THREE.SphereGeometry(0.1, 4, 4);
function spawnParticles(pos, col, n) {
  for (var i = 0; i < (n||10); i++) {
    var m = new THREE.Mesh(pgeo, pmat.clone());
    m.material.color.set(col); m.position.copy(pos);
    scene.add(m);
    var v = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize().multiplyScalar(0.15+Math.random()*0.2);
    particles.push({ mesh:m, vel:v, life:1 });
  }
}

// -- KILL ENEMY --
function killEnemy(e, idx) {
  spawnParticles(e.mesh.position, e.mesh.userData.col||0xff8800, 12);
  boom(e.type==='boss');
  scene.remove(e.mesh);
  enemies.splice(idx, 1);
  score += (e.type==='boss' ? 500 : e.type==='asteroid' ? 10 : 20) * level;
  updateHUD();
}

// -- DAMAGE --
function hitShip() {
  if (shipInv > 0) return;
  shipInv = 90; lives--;
  boom(false);
  spawnParticles(ship.position, 0xff4400, 10);
  updateHUD();
  if (lives <= 0) gameOver();
}

function gameOver() {
  STATE = 'over';
  var ov = document.getElementById('overlay');
  document.getElementById('ov-title').textContent = 'Game Over';
  document.getElementById('ov-title').style.animation = 'none';
  document.getElementById('ov-title').style.opacity = '1';
  document.getElementById('ov-alien').textContent = '💀';
  document.getElementById('ov-alien').style.animation = 'none';
  document.getElementById('ov-alien').style.opacity = '1';
  document.getElementById('ov-hint').textContent = 'Score ' + score.toLocaleString() + '  ·  Level ' + level;
  document.getElementById('ov-hint').style.animation = 'none';
  document.getElementById('ov-hint').style.opacity = '1';
  document.getElementById('ov-cta').textContent = 'Tap or Space to retry';
  document.getElementById('ov-cta').style.opacity = '1';
  ov.classList.remove('hide');
}

// -- HUD --
var liveEmojis = ['','❤️','❤️❤️','❤️❤️❤️'];
function updateHUD() {
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('level').textContent = 'LEVEL ' + level;
  document.getElementById('lives').textContent = lives >= 3 ? '❤️❤️❤️' : lives === 2 ? '❤️❤️' : lives === 1 ? '❤️' : '';
}

var msgTO = null;
function showMsg(txt) {
  // simple flash via overlay briefly
  clearTimeout(msgTO);
}

// -- MAIN LOOP --
function loop() {
  requestAnimationFrame(loop);
  frame++;

  updateStars();

  if (STATE !== 'play') { renderer.render(scene, camera); return; }

  // ship movement
  var spd = 0.14;
  if (keys['ArrowLeft'] || keys['a'] || keys['A'] || joyX < -0.1)
    ship.position.x = Math.max(-13, ship.position.x - spd*(Math.abs(joyX)||1));
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || joyX > 0.1)
    ship.position.x = Math.min(13, ship.position.x + spd*(Math.abs(joyX)||1));
  if (keys['ArrowUp'] || keys['w'] || keys['W'] || joyY < -0.1)
    ship.position.z = Math.max(-4, ship.position.z - spd*(Math.abs(joyY)||1));
  if (keys['ArrowDown'] || keys['s'] || keys['S'] || joyY > 0.1)
    ship.position.z = Math.min(11, ship.position.z + spd*(Math.abs(joyY)||1));

  // auto fire on mobile hold
  if (tfire && shootCD <= 0) shoot();
  if (keys[' '] && shootCD <= 0) shoot();
  if (shootCD > 0) shootCD--;

  // ship tilt
  var tiltT = (keys['ArrowLeft']||joyX<-0.1) ? 0.35 : (keys['ArrowRight']||joyX>0.1) ? -0.35 : 0;
  ship.rotation.z += (tiltT - ship.rotation.z) * 0.1;
  ship.rotation.x += (-0.06 - ship.rotation.x) * 0.05;
  ship.visible = !(shipInv > 0 && Math.floor(shipInv/6)%2===0);
  if (shipInv > 0) shipInv--;

  // engine pulse
  if (ship.userData.elight) ship.userData.elight.intensity = 2.8 + Math.sin(frame*0.25)*0.9;

  // camera loosely follows
  camera.position.x += (ship.position.x*0.15 - camera.position.x) * 0.04;

  // player bullets
  for (var i = bullets.length-1; i >= 0; i--) {
    var b = bullets[i];
    b.mesh.position.z += b.dz;
    if (b.mesh.position.z < -45) { scene.remove(b.mesh); bullets.splice(i,1); continue; }
    // vs enemies
    var hit = false;
    for (var j = enemies.length-1; j >= 0 && !hit; j--) {
      var e = enemies[j];
      var dist = b.mesh.position.distanceTo(e.mesh.position);
      var rad = (e.type==='asteroid') ? e.r+0.3 : (e.type==='boss') ? 4.5 : 1.4;
      if (dist < rad) {
        e.hp--;
        spawnParticles(b.mesh.position, 0xffaa44, 5);
        scene.remove(b.mesh); bullets.splice(i,1); hit=true;
        if (e.hp <= 0) killEnemy(e, j);
      }
    }
  }

  // enemies
  for (var ei = enemies.length-1; ei >= 0; ei--) {
    var en = enemies[ei];

    if (en.type === 'asteroid') {
      en.mesh.position.x += en.vx;
      en.mesh.position.z += en.vz;
      en.mesh.rotation.x += en.rx;
      en.mesh.rotation.y += en.ry;
      if (en.mesh.position.x < -15 || en.mesh.position.x > 15) en.vx *= -1;
      if (en.mesh.position.z > 16) { scene.remove(en.mesh); enemies.splice(ei,1); continue; }
      if (ship.visible && en.mesh.position.distanceTo(ship.position) < en.r + 0.7) {
        spawnParticles(en.mesh.position, 0xff8833, 10);
        scene.remove(en.mesh); enemies.splice(ei,1); hitShip(); continue;
      }
    }

    if (en.type === 'ufo') {
      en.phase += 0.04;
      en.mesh.rotation.y += 0.04;
      en.mesh.position.y = Math.sin(en.phase) * 0.3;
      en.mesh.position.x += en.dx;
      if (en.mesh.position.x > 13 || en.mesh.position.x < -13) en.dx *= -1;
      if (en.mesh.position.z > 16) { scene.remove(en.mesh); enemies.splice(ei,1); continue; }
      // shoot at player
      en.shootT--;
      if (en.shootT <= 0) {
        en.shootT = 50 + Math.random()*60;
        var dir = ship.position.clone().sub(en.mesh.position).normalize();
        spawnEBullet(en.mesh.position.clone(), dir.x*0.13, dir.z*0.14);
        beep(500, 'triangle', 0.08, 0.08);
      }
      if (ship.visible && en.mesh.position.distanceTo(ship.position) < 1.6) {
        scene.remove(en.mesh); enemies.splice(ei,1); hitShip(); continue;
      }
    }

    if (en.type === 'boss') {
      en.phase += 0.025;
      en.mesh.position.x += en.dx;
      if (en.mesh.position.x > 11 || en.mesh.position.x < -11) en.dx *= -1;
      en.mesh.rotation.y += 0.01;
      if (en.mesh.userData.ring) en.mesh.userData.ring.rotation.z += 0.02;
      // eye pulse
      en.shootT++;
      var brate = Math.max(18, 40 - level*2);
      if (en.shootT >= brate) {
        en.shootT = 0;
        // spread shot
        for (var s = -1; s <= 1; s++) {
          var bdir = ship.position.clone().sub(en.mesh.position).normalize();
          spawnEBullet(en.mesh.position.clone(), bdir.x*0.16 + s*0.08, bdir.z*0.16);
        }
        beep(400, 'triangle', 0.1, 0.1);
      }
      if (ship.visible && en.mesh.position.distanceTo(ship.position) < 4.8) {
        hitShip();
      }
    }
  }

  // enemy bullets
  for (var ebi = ebullets.length-1; ebi >= 0; ebi--) {
    var eb = ebullets[ebi];
    eb.mesh.position.x += eb.dx;
    eb.mesh.position.z += eb.dz;
    if (eb.mesh.position.z > 18) { scene.remove(eb.mesh); ebullets.splice(ebi,1); continue; }
    if (ship.visible && eb.mesh.position.distanceTo(ship.position) < 1.0) {
      spawnParticles(eb.mesh.position, 0xff4400, 6);
      scene.remove(eb.mesh); ebullets.splice(ebi,1); hitShip();
    }
  }

  // particles
  for (var pi = particles.length-1; pi >= 0; pi--) {
    var pt = particles[pi];
    pt.mesh.position.x += pt.vel.x;
    pt.mesh.position.y += pt.vel.y;
    pt.mesh.position.z += pt.vel.z;
    pt.vel.multiplyScalar(0.92);
    pt.life -= 0.03;
    pt.mesh.material.opacity = pt.life;
    if (pt.life <= 0) { scene.remove(pt.mesh); particles.splice(pi,1); }
  }

  // wave clear
  if (enemies.length === 0) {
    level++;
    updateHUD();
    spawnWave();
  }

  renderer.render(scene, camera);
}

updateHUD();
loop();
</script>
