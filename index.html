<!DOCTYPE html>
<html>
<head>
<title>Last Pilot</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none}
canvas{display:block}
#overlay{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);font-family:'Segoe UI',Arial,sans-serif}
#overlay.hide{display:none}
#overlay h1{font-size:clamp(32px,8vw,72px);font-weight:100;letter-spacing:14px;color:#fff;text-transform:uppercase;margin-bottom:6px}
#overlay .sub{font-size:clamp(10px,2.2vw,14px);letter-spacing:8px;color:rgba(255,255,255,0.35);text-transform:uppercase;margin-bottom:36px}
#overlay .controls{font-size:clamp(11px,2vw,14px);color:rgba(255,255,255,0.55);line-height:2.4;text-align:center;margin-bottom:36px}
#overlay .cta{font-size:clamp(11px,2.2vw,13px);letter-spacing:6px;color:rgba(0,255,180,0.8);text-transform:uppercase;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
#hud{position:fixed;inset:0;pointer-events:none;z-index:5;font-family:'Segoe UI',Arial,sans-serif}
#score{position:absolute;top:18px;left:50%;transform:translateX(-50%);font-size:clamp(20px,4vw,34px);font-weight:100;letter-spacing:6px;color:#fff}
#lvl{position:absolute;top:54px;left:50%;transform:translateX(-50%);font-size:clamp(9px,1.8vw,12px);letter-spacing:8px;color:rgba(255,255,255,0.3);text-transform:uppercase}
#lives-row{position:absolute;top:18px;right:20px;display:flex;gap:7px}
.hrt{width:9px;height:9px;border-radius:50%;background:#ff3355;box-shadow:0 0 7px #ff3355}
.hrt.off{background:rgba(255,255,255,0.1);box-shadow:none}
#coins{position:absolute;top:18px;left:20px;font-size:clamp(12px,2.5vw,15px);font-weight:300;letter-spacing:2px;color:#ffdd00}
#wpn{position:absolute;bottom:22px;left:50%;transform:translateX(-50%);text-align:center}
#wpn-name{font-size:clamp(9px,1.8vw,11px);letter-spacing:6px;color:rgba(0,200,255,0.6);text-transform:uppercase;margin-bottom:5px}
#sp-track{width:100px;height:2px;background:rgba(255,255,255,0.1);border-radius:2px;margin:0 auto}
#sp-fill{height:2px;background:#ffaa00;border-radius:2px;width:0%;box-shadow:0 0 5px #ffaa00}
#sp-lbl{font-size:9px;letter-spacing:4px;color:rgba(255,170,0,0.5);text-transform:uppercase;margin-top:3px;text-align:center}
#streak{position:absolute;top:15%;left:50%;transform:translateX(-50%);font-size:clamp(13px,3vw,20px);letter-spacing:5px;color:#ffcc00;font-weight:300;text-transform:uppercase;opacity:0;transition:opacity .3s;text-align:center}
#boss-bar{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);width:min(380px,70vw);display:none}
#boss-lbl{font-size:10px;letter-spacing:6px;color:rgba(255,80,0,0.8);text-transform:uppercase;text-align:center;margin-bottom:5px}
#boss-track{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:3px}
#boss-fill{height:6px;background:#ff3300;border-radius:3px;width:100%;box-shadow:0 0 10px #ff3300;transition:width .1s}
#warn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(18px,5vw,40px);letter-spacing:6px;color:#ff3300;font-weight:100;text-transform:uppercase;opacity:0;text-align:center;pointer-events:none}
/* UPGRADE */
#upg{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,5,0.9);font-family:'Segoe UI',Arial,sans-serif;backdrop-filter:blur(8px)}
#upg.show{display:flex}
#upg h2{font-size:clamp(14px,3.5vw,26px);font-weight:100;letter-spacing:12px;color:#fff;text-transform:uppercase;margin-bottom:4px}
#upg .uc{font-size:clamp(12px,2.5vw,16px);color:#ffdd00;letter-spacing:4px;margin-bottom:28px}
#upg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:min(620px,90vw);margin-bottom:20px}
.uc2{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;user-select:none}
.uc2:hover,.uc2:active{background:rgba(255,255,255,0.07);border-color:rgba(255,210,0,0.35)}
.uc2.maxed{border-color:rgba(0,255,100,0.3)}
.uc2.poor{opacity:.35;pointer-events:none}
.ui{font-size:clamp(18px,4vw,24px);margin-bottom:5px}
.un{font-size:clamp(9px,1.8vw,12px);color:#fff;letter-spacing:3px;font-weight:300;margin-bottom:2px}
.ud{font-size:clamp(8px,1.5vw,10px);color:rgba(255,255,255,.32);letter-spacing:1px;line-height:1.5}
.ubar-bg{width:100%;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;margin:6px 0 4px}
.ubar{height:2px;background:#ffdd00;border-radius:2px}
.ucost{font-size:clamp(8px,1.5vw,10px);color:#ffdd00;letter-spacing:2px}
#upg-cta{font-size:clamp(9px,1.8vw,11px);letter-spacing:6px;color:rgba(0,255,180,0.6);text-transform:uppercase;animation:blink 1.8s ease-in-out infinite}
/* MOBILE */
#jz{position:fixed;left:0;bottom:0;width:48vw;height:44vh;z-index:8}
#jp{position:absolute;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);bottom:26px;left:24px}
#jk{width:36px;height:36px;border-radius:50%;background:rgba(0,180,255,0.22);border:1px solid rgba(0,200,255,0.4);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#fz{position:fixed;right:0;bottom:0;width:52vw;height:44vh;z-index:8;display:flex;align-items:center;justify-content:center;gap:18px}
.fb{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;letter-spacing:2px;font-weight:400;user-select:none;border:1px solid;text-transform:uppercase;font-family:'Segoe UI',Arial,sans-serif}
#fb1{background:rgba(0,200,255,0.08);border-color:rgba(0,200,255,0.3);color:rgba(0,200,255,0.6)}
#fb2{background:rgba(255,150,0,0.08);border-color:rgba(255,150,0,0.3);color:rgba(255,150,0,0.6)}
</style>
</head>
<body>
<!-- INTRO OVERLAY -->
<div id="overlay">
  <h1>Last Pilot</h1>
  <div class="sub">Earth's Final Defense</div>
  <div class="controls">
    Arrow Keys — Move &nbsp;|&nbsp; Space — Fire<br>
    Z — Special Weapon &nbsp;|&nbsp; Survive all waves
  </div>
  <div class="cta" id="cta-txt">Press Space or Tap Fire</div>
</div>

<!-- UPGRADE SCREEN -->
<div id="upg">
  <h2>Upgrade Hangar</h2>
  <div class="uc">⬡ <span id="uc-val">0</span> &nbsp;coins</div>
  <div id="upg-grid"></div>
  <div id="upg-cta">Enter / Fire — Launch Next Wave</div>
</div>

<!-- HUD -->
<div id="hud">
  <div id="score">0</div>
  <div id="lvl">Level 1</div>
  <div id="lives-row">
    <div class="hrt" id="h1"></div><div class="hrt" id="h2"></div><div class="hrt" id="h3"></div>
  </div>
  <div id="coins">⬡ 0</div>
  <div id="streak"></div>
  <div id="boss-bar"><div id="boss-lbl">⚠ BOSS</div><div id="boss-track"><div id="boss-fill"></div></div></div>
  <div id="warn"></div>
  <div id="wpn">
    <div id="wpn-name">Pulse Cannon</div>
    <div id="sp-track"><div id="sp-fill"></div></div>
    <div id="sp-lbl">special</div>
  </div>
</div>

<!-- MOBILE -->
<div id="jz"><div id="jp"><div id="jk"></div></div></div>
<div id="fz"><div class="fb" id="fb2">SPEC</div><div class="fb" id="fb1">FIRE</div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ──────────────────────────────────────────────
// AUDIO ENGINE
// ──────────────────────────────────────────────
const AC=new(window.AudioContext||window.webkitAudioContext)();
function ra(){if(AC.state==='suspended')AC.resume();}
function playTone(freq,type,dur,vol=0.22,sweep=null){
  ra();
  try{
    const o=AC.createOscillator(),g=AC.createGain(),c=AC.createBiquadFilter();
    c.type='lowpass';c.frequency.value=4000;
    o.connect(c);c.connect(g);g.connect(AC.destination);
    o.type=type;o.frequency.setValueAtTime(freq,AC.currentTime);
    if(sweep)o.frequency.exponentialRampToValueAtTime(sweep,AC.currentTime+dur);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    o.start();o.stop(AC.currentTime+dur+0.02);
  }catch(e){}
}
function playNoise(dur,vol=0.28,cutoff=600){
  ra();
  try{
    const buf=AC.createBuffer(1,Math.floor(AC.sampleRate*dur),AC.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    f.type='lowpass';f.frequency.value=cutoff;
    s.buffer=buf;s.connect(f);f.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(vol,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+dur);
    s.start();s.stop(AC.currentTime+dur+0.02);
  }catch(e){}
}
const SFX={
  shoot:()=>{playTone(880,'square',0.07,0.13,320);},
  laser:()=>{playTone(1600,'sawtooth',0.16,0.14,160);},
  missile:()=>{playTone(260,'sawtooth',0.09,0.18,900);},
  plasma:()=>{playTone(700,'sine',0.13,0.13,180);playTone(350,'square',0.1,0.07,140);},
  explode:(big=false)=>{playNoise(big?0.7:0.35,big?0.48:0.3,big?300:500);playTone(big?55:90,'sawtooth',big?0.55:0.32,big?0.32:0.2,big?12:16);},
  hit:()=>{playNoise(0.18,0.26,400);playTone(140,'sawtooth',0.14,0.18,40);},
  coin:()=>{playTone(1400,'sine',0.06,0.14);setTimeout(()=>playTone(1800,'sine',0.06,0.11),55);},
  levelup:()=>{[280,380,520,700,950].forEach((f,i)=>setTimeout(()=>playTone(f,'sine',0.18,0.16),i*75));},
  boss:()=>{[70,55,90,45].forEach((f,i)=>setTimeout(()=>playTone(f,'sawtooth',0.45,0.36),i*280));},
  alien:()=>{playTone(580,'triangle',0.09,0.09,200);},
  freeze:()=>{playTone(900,'sine',0.5,0.18,40);},
  blackhole:()=>{playTone(50,'sine',0.7,0.38,22);}
};

// ──────────────────────────────────────────────
// THREE.JS RENDERER
// ──────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000008);
scene.fog=new THREE.FogExp2(0x000008,0.009);

const camera=new THREE.PerspectiveCamera(55,window.innerWidth/window.innerHeight,0.1,800);
camera.position.set(0,9,24);
camera.lookAt(0,1,0);

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// ── LIGHTS ──
scene.add(new THREE.AmbientLight(0x112244,1.0));
const sun=new THREE.DirectionalLight(0x5588ff,2.0);
sun.position.set(6,12,8);sun.castShadow=true;
sun.shadow.mapSize.set(1024,1024);sun.shadow.camera.near=0.5;sun.shadow.camera.far=200;
scene.add(sun);
const rim=new THREE.DirectionalLight(0xff4422,0.7);rim.position.set(-8,-4,-12);scene.add(rim);
const shipLight=new THREE.PointLight(0x0088ff,3,18);scene.add(shipLight);

// ── STARFIELD ──
function makeStarfield(){
  const geo=new THREE.BufferGeometry();
  const n=3500,pos=new Float32Array(n*3),col=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    pos[i*3]=(Math.random()-0.5)*500;
    pos[i*3+1]=(Math.random()-0.5)*500;
    pos[i*3+2]=(Math.random()-0.5)*300-50;
    const t=Math.random();
    col[i*3]=0.7+t*0.3;col[i*3+1]=0.7+t*0.3;col[i*3+2]=0.8+t*0.2;
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  return new THREE.Points(geo,new THREE.PointsMaterial({size:0.28,sizeAttenuation:true,vertexColors:true}));
}
const starfield=makeStarfield();scene.add(starfield);

// ──────────────────────────────────────────────
// BUILD SHIP (PLAYER) — detailed UFO-style fighter
// ──────────────────────────────────────────────
function buildPlayerShip(){
  const g=new THREE.Group();

  // fuselage
  const fuseGeo=new THREE.CylinderGeometry(0.28,0.55,3.6,10);
  const fuseMat=new THREE.MeshStandardMaterial({color:0x99ccff,metalness:0.92,roughness:0.08,emissive:0x001133,emissiveIntensity:0.3});
  const fuse=new THREE.Mesh(fuseGeo,fuseMat);fuse.rotation.x=Math.PI/2;fuse.castShadow=true;g.add(fuse);

  // nose
  const noseGeo=new THREE.ConeGeometry(0.28,1.4,10);
  const noseMat=new THREE.MeshStandardMaterial({color:0xbbddff,metalness:0.95,roughness:0.05,emissive:0x002255,emissiveIntensity:0.2});
  const nose=new THREE.Mesh(noseGeo,noseMat);nose.rotation.x=-Math.PI/2;nose.position.z=-2.5;g.add(nose);

  // cockpit glass
  const cockGeo=new THREE.SphereGeometry(0.42,14,10,0,Math.PI*2,0,Math.PI*0.55);
  const cockMat=new THREE.MeshStandardMaterial({color:0x44aaff,metalness:0.05,roughness:0.0,transparent:true,opacity:0.82,emissive:0x0055cc,emissiveIntensity:0.5});
  const cock=new THREE.Mesh(cockGeo,cockMat);cock.rotation.x=Math.PI;cock.position.z=-0.5;cock.position.y=0.28;g.add(cock);

  // left wing
  const wShape=new THREE.Shape();
  wShape.moveTo(0,0);wShape.lineTo(2.8,-1.0);wShape.lineTo(3.2,-0.4);wShape.lineTo(0.5,0.5);
  const wExt={depth:0.08,bevelEnabled:false};
  const wGeo=new THREE.ExtrudeGeometry(wShape,wExt);
  const wMat=new THREE.MeshStandardMaterial({color:0x3366aa,metalness:0.85,roughness:0.18,emissive:0x001144,emissiveIntensity:0.25});
  const wL=new THREE.Mesh(wGeo,wMat);wL.rotation.x=Math.PI/2;wL.position.set(-0.15,0,0.4);wL.castShadow=true;g.add(wL);
  const wR=wL.clone();wR.scale.x=-1;wR.position.x=0.15;g.add(wR);

  // swept back fins
  const fShape=new THREE.Shape();
  fShape.moveTo(0,0);fShape.lineTo(0.8,-1.8);fShape.lineTo(1.0,-1.5);fShape.lineTo(0.15,0.2);
  const fGeo=new THREE.ExtrudeGeometry(fShape,{depth:0.05,bevelEnabled:false});
  const fMat=new THREE.MeshStandardMaterial({color:0x2255aa,metalness:0.9,roughness:0.15});
  const fL=new THREE.Mesh(fGeo,fMat);fL.rotation.x=Math.PI/2;fL.position.set(-0.2,0,1.2);g.add(fL);
  const fR=fL.clone();fR.scale.x=-1;fR.position.x=0.2;g.add(fR);

  // engine nacelles
  [-0.9,0.9].forEach(x=>{
    const nac=new THREE.Group();
    const nacGeo=new THREE.CylinderGeometry(0.16,0.22,1.2,8);
    const nacMat=new THREE.MeshStandardMaterial({color:0x7799cc,metalness:0.9,roughness:0.1});
    const nacM=new THREE.Mesh(nacGeo,nacMat);nacM.rotation.x=Math.PI/2;nac.add(nacM);
    // engine glow ring
    const glowGeo=new THREE.TorusGeometry(0.18,0.05,8,16);
    const glowMat=new THREE.MeshStandardMaterial({color:0x0055ff,emissive:0x0044ff,emissiveIntensity:5});
    const glow=new THREE.Mesh(glowGeo,glowMat);glow.position.z=0.65;nac.add(glow);
    const eL=new THREE.PointLight(0x0066ff,2.5,5);eL.position.z=0.8;nac.add(eL);
    nac.position.set(x,0,0.8);g.add(nac);
  });

  // center engine
  const cEngGeo=new THREE.CylinderGeometry(0.28,0.32,0.6,10);
  const cEngMat=new THREE.MeshStandardMaterial({color:0x0044ff,emissive:0x0033ff,emissiveIntensity:4,metalness:0.5});
  const cEng=new THREE.Mesh(cEngGeo,cEngMat);cEng.rotation.x=Math.PI/2;cEng.position.z=2.0;g.add(cEng);
  const cEngLight=new THREE.PointLight(0x0088ff,4,8);cEngLight.position.z=2.4;g.add(cEngLight);
  g.userData.cEngLight=cEngLight;g.userData.cEngMat=cEngMat;

  // engine trail mesh
  const trailGeo=new THREE.CylinderGeometry(0.01,0.28,2.5,8,1,true);
  const trailMat=new THREE.MeshBasicMaterial({color:0x0044ff,transparent:true,opacity:0.25,side:THREE.BackSide});
  const trail=new THREE.Mesh(trailGeo,trailMat);trail.rotation.x=Math.PI/2;trail.position.z=3.2;g.add(trail);
  g.userData.trail=trail;

  g.rotation.y=Math.PI;
  return g;
}

// ──────────────────────────────────────────────
// BUILD ENEMY UFO — classic flying saucer
// ──────────────────────────────────────────────
function buildUFO(type='normal'){
  const g=new THREE.Group();
  const colors={
    normal:{body:0x22bb44,dome:0xaaffcc,glow:0x00ff66,light:0x22ff44},
    kamikaze:{body:0xff4400,dome:0xff9966,glow:0xff6600,light:0xff5500},
    shielded:{body:0x8833ff,dome:0xcc99ff,glow:0xaa44ff,light:0x9933ff},
    splitter:{body:0xddcc00,dome:0xffee88,glow:0xffcc00,light:0xffcc00},
    elite:{body:0xff0055,dome:0xff88aa,glow:0xff2266,light:0xff0044}
  };
  const c=colors[type]||colors.normal;

  // main saucer disk
  const diskGeo=new THREE.CylinderGeometry(1.6,1.2,0.35,20);
  const diskMat=new THREE.MeshStandardMaterial({color:c.body,metalness:0.8,roughness:0.2,emissive:new THREE.Color(c.body).multiplyScalar(0.3),emissiveIntensity:0.6});
  g.add(new THREE.Mesh(diskGeo,diskMat));

  // upper dome
  const topGeo=new THREE.SphereGeometry(0.85,16,10,0,Math.PI*2,0,Math.PI*0.5);
  const topMat=new THREE.MeshStandardMaterial({color:c.dome,metalness:0.1,roughness:0.0,transparent:true,opacity:0.8,emissive:new THREE.Color(c.dome).multiplyScalar(0.4),emissiveIntensity:0.5});
  const top=new THREE.Mesh(topGeo,topMat);top.position.y=0.18;g.add(top);

  // under dome / belly
  const botGeo=new THREE.SphereGeometry(0.7,14,8,0,Math.PI*2,Math.PI*0.5,Math.PI*0.5);
  const botMat=new THREE.MeshStandardMaterial({color:c.body,metalness:0.9,roughness:0.1,emissive:new THREE.Color(c.glow).multiplyScalar(0.5),emissiveIntensity:0.8});
  const bot=new THREE.Mesh(botGeo,botMat);bot.position.y=-0.18;g.add(bot);

  // rim lights (rotating ring of lights)
  for(let i=0;i<10;i++){
    const a=(Math.PI*2/10)*i;
    const lGeo=new THREE.SphereGeometry(0.1,6,6);
    const lMat=new THREE.MeshStandardMaterial({color:c.glow,emissive:c.glow,emissiveIntensity:4});
    const lm=new THREE.Mesh(lGeo,lMat);
    lm.position.set(Math.cos(a)*1.5,0,Math.sin(a)*1.5);g.add(lm);
  }

  // engine glow underneath
  const engGeo=new THREE.CylinderGeometry(0.35,0.5,0.2,12);
  const engMat=new THREE.MeshStandardMaterial({color:c.glow,emissive:c.glow,emissiveIntensity:5});
  const eng=new THREE.Mesh(engGeo,engMat);eng.position.y=-0.52;g.add(eng);

  // point light
  const pl=new THREE.PointLight(c.light,3,8);pl.position.y=-0.5;g.add(pl);

  // shield sphere for shielded type
  if(type==='shielded'){
    const shGeo=new THREE.SphereGeometry(2.2,16,16);
    const shMat=new THREE.MeshStandardMaterial({color:0xaa44ff,transparent:true,opacity:0.12,emissive:0x8822ff,emissiveIntensity:1.5,side:THREE.DoubleSide,wireframe:false});
    const sh=new THREE.Mesh(shGeo,shMat);g.add(sh);g.userData.shieldMesh=sh;
  }

  g.userData.type=type;g.userData.glowColor=c.glow;g.userData.bodyColor=c.body;
  return g;
}

// ──────────────────────────────────────────────
// BUILD ASTEROID — chunky, cratered, realistic
// ──────────────────────────────────────────────
function buildAsteroid(radius,type='normal'){
  const detail=type==='armored'?2:1;
  const geo=new THREE.IcosahedronGeometry(radius,detail);
  const pos=geo.attributes.position;
  // deform geometry to look rocky
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),y=pos.getY(i),z=pos.getZ(i);
    const n=0.35+Math.random()*0.3;
    pos.setXYZ(i,x*n+x*(1-n),y*n+y*(1-n),z*n+z*(1-n));
  }
  geo.computeVertexNormals();
  const mats={
    normal:new THREE.MeshStandardMaterial({color:0x7a6040,metalness:0.05,roughness:0.97,emissive:0x1a0e00,emissiveIntensity:0.1}),
    armored:new THREE.MeshStandardMaterial({color:0x334466,metalness:0.85,roughness:0.15,emissive:0x001133,emissiveIntensity:0.4}),
    exploding:new THREE.MeshStandardMaterial({color:0xcc3300,metalness:0.2,roughness:0.8,emissive:0x441100,emissiveIntensity:0.6})
  };
  const mesh=new THREE.Mesh(geo,mats[type]||mats.normal);mesh.castShadow=true;mesh.receiveShadow=true;

  // add craters (small sphere indentations via child dark spheres)
  const craterCount=Math.floor(2+Math.random()*3);
  for(let i=0;i<craterCount;i++){
    const cGeo=new THREE.SphereGeometry(radius*0.18,6,6);
    const cMat=new THREE.MeshStandardMaterial({color:0x1a1008,roughness:1,metalness:0});
    const cr=new THREE.Mesh(cGeo,cMat);
    const a1=Math.random()*Math.PI*2,a2=Math.random()*Math.PI;
    cr.position.set(Math.cos(a1)*Math.sin(a2)*radius*0.88,Math.cos(a2)*radius*0.88,Math.sin(a1)*Math.sin(a2)*radius*0.88);
    mesh.add(cr);
  }

  if(type==='armored'){const pl=new THREE.PointLight(0x2244ff,1.2,radius*5);mesh.add(pl);}
  if(type==='exploding'){const pl=new THREE.PointLight(0xff5500,1.5,radius*5);mesh.add(pl);}
  return mesh;
}

// BUILD BOSS — giant mothership
// ──────────────────────────────────────────────
function buildBoss(){
  const g=new THREE.Group();

  // main hull
  const hullGeo=new THREE.CylinderGeometry(4.5,3.2,1.4,24);
  const hullMat=new THREE.MeshStandardMaterial({color:0xcc1100,metalness:0.75,roughness:0.3,emissive:0x440000,emissiveIntensity:0.4});
  g.add(new THREE.Mesh(hullGeo,hullMat));

  // top battle dome
  const tdGeo=new THREE.SphereGeometry(2.2,18,14,0,Math.PI*2,0,Math.PI*0.5);
  const tdMat=new THREE.MeshStandardMaterial({color:0xdd2200,metalness:0.6,roughness:0.4,emissive:0x550000,emissiveIntensity:0.6});
  const td=new THREE.Mesh(tdGeo,tdMat);td.position.y=0.7;g.add(td);

  // bottom battle dome
  const bdGeo=new THREE.SphereGeometry(1.8,16,12,0,Math.PI*2,Math.PI*0.5,Math.PI*0.5);
  const bdMat=new THREE.MeshStandardMaterial({color:0xff3300,metalness:0.7,roughness:0.3,emissive:0xff1100,emissiveIntensity:1.2});
  const bd=new THREE.Mesh(bdGeo,bdMat);bd.position.y=-0.7;g.add(bd);

  // rotating outer ring
  const ringGeo=new THREE.TorusGeometry(5.8,0.25,8,48);
  const ringMat=new THREE.MeshStandardMaterial({color:0xff4400,emissive:0xff2200,emissiveIntensity:3,metalness:0.8});
  const ring=new THREE.Mesh(ringGeo,ringMat);ring.rotation.x=Math.PI/2;g.add(ring);
  g.userData.ring=ring;

  // secondary rings
  [4.2,7.0].forEach((r,i)=>{
    const rGeo=new THREE.TorusGeometry(r,0.14,6,36);
    const rMat=new THREE.MeshStandardMaterial({color:0xff5500,emissive:0xff3300,emissiveIntensity:2});
    const rm=new THREE.Mesh(rGeo,rMat);rm.rotation.x=Math.PI*0.4+i*0.3;rm.rotation.z=i*0.6;
    g.userData['ring'+i]=rm;g.add(rm);
  });

  // spikes around perimeter
  for(let i=0;i<14;i++){
    const a=(Math.PI*2/14)*i;
    const sGeo=new THREE.ConeGeometry(0.28,2.2,6);
    const sMat=new THREE.MeshStandardMaterial({color:0xff3300,metalness:0.8,roughness:0.2,emissive:0xff1100,emissiveIntensity:0.5});
    const sp=new THREE.Mesh(sGeo,sMat);
    sp.position.set(Math.cos(a)*4.4,0,Math.sin(a)*4.4);
    sp.rotation.z=-a-Math.PI/2;sp.rotation.x=Math.PI/2;g.add(sp);
  }

  // MAIN EYE
  const eyeGeo=new THREE.SphereGeometry(0.85,16,16);
  const eyeMat=new THREE.MeshStandardMaterial({color:0xffff00,emissive:0xffcc00,emissiveIntensity:6});
  const eye=new THREE.Mesh(eyeGeo,eyeMat);eye.position.y=1.0;g.add(eye);
  const eyeLight=new THREE.PointLight(0xffff00,5,14);eyeLight.position.copy(eye.position);g.add(eyeLight);
  g.userData.eye=eye;g.userData.eyeLight=eyeLight;

  // turrets
  for(let i=0;i<4;i++){
    const a=(Math.PI*2/4)*i+Math.PI/4;
    const tGeo=new THREE.CylinderGeometry(0.22,0.28,0.7,8);
    const tMat=new THREE.MeshStandardMaterial({color:0x882200,metalness:0.9,roughness:0.2});
    const t=new THREE.Mesh(tGeo,tMat);t.position.set(Math.cos(a)*3.0,0,Math.sin(a)*3.0);
    const bGeo=new THREE.SphereGeometry(0.3,8,8);
    const bMat=new THREE.MeshStandardMaterial({color:0xff4400,emissive:0xff2200,emissiveIntensity:2});
    const b=new THREE.Mesh(bGeo,bMat);b.position.y=-0.4;t.add(b);
    const tL=new THREE.PointLight(0xff4400,2,4);tL.position.y=-0.5;t.add(tL);
    g.add(t);
  }

  // core glow
  const coreLight=new THREE.PointLight(0xff3300,6,20);g.add(coreLight);
  g.userData.coreLight=coreLight;

  return g;
}

// BULLET BUILDERS
// ──────────────────────────────────────────────
function makePBullet(type='pulse'){
  const g=new THREE.Group();
  if(type==='pulse'){
    const geo=new THREE.CapsuleGeometry(0.06,0.7,4,8);
    const mat=new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff,emissiveIntensity:5});
    g.add(new THREE.Mesh(geo,mat));g.add(new THREE.PointLight(0x00ffff,2.5,4));
  } else if(type==='plasma'){
    const geo=new THREE.SphereGeometry(0.3,8,8);
    const mat=new THREE.MeshStandardMaterial({color:0xcc00ff,emissive:0xaa00ff,emissiveIntensity:5,transparent:true,opacity:0.88});
    g.add(new THREE.Mesh(geo,mat));g.add(new THREE.PointLight(0xcc00ff,3,5));
  } else if(type==='missile'){
    const geo=new THREE.ConeGeometry(0.1,0.8,6);
    const mat=new THREE.MeshStandardMaterial({color:0xffbb00,emissive:0xff8800,emissiveIntensity:4});
    const m=new THREE.Mesh(geo,mat);m.rotation.x=Math.PI/2;g.add(m);g.add(new THREE.PointLight(0xffaa00,2,4));
  }
  g.rotation.x=Math.PI/2;
  return g;
}
function makeEBullet(){
  const geo=new THREE.SphereGeometry(0.2,6,6);
  const mat=new THREE.MeshStandardMaterial({color:0xff4400,emissive:0xff2200,emissiveIntensity:4});
  const g=new THREE.Group();g.add(new THREE.Mesh(geo,mat));g.add(new THREE.PointLight(0xff4400,2,4));
  return g;
}

const pPool=[];const activeP=[];
function getP(){
  if(pPool.length){const p=pPool.pop();p.visible=true;return p;}
  const geo=new THREE.SphereGeometry(0.1,4,4);
  const mat=new THREE.MeshBasicMaterial({color:0xff8800,transparent:true});
  const m=new THREE.Mesh(geo,mat);scene.add(m);return m;
}
function burst(pos,color,n=14,spd=5){
  for(let i=0;i<n;i++){
    const p=getP();p.material.color.set(color);p.material.opacity=1;
    p.position.copy(pos);
    const v=new THREE.Vector3((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)).normalize().multiplyScalar(spd*(0.3+Math.random()));
    activeP.push({m:p,v,life:1,dec:0.025+Math.random()*0.02,scale:0.08+Math.random()*0.12});
  }
}

}

// ──────────────────────────────────────────────
// START / RESTART
// ──────────────────────────────────────────────
function startGame(){
  document.getElementById('overlay').classList.add('hide');
  if(!shipMesh){shipMesh=buildPlayerShip();scene.add(shipMesh);}
  shipMesh.position.set(0,0,10);shipPos.x=0;shipPos.z=0;
  gState='playing';spawnWave();
}

function restartGame(){
  document.getElementById('overlay').classList.add('hide');
  clearAll();
  score=0;coins=0;lives=3;level=1;frame=0;killStreak=0;specialCharge=0;
  Object.keys(STATS).forEach(k=>STATS[k]=0);
  shipInvincible=0;shipCooldown=0;
  updateHUD();gState='playing';spawnWave();
}

function clearAll(){
  [...pBullets,...eBullets2,...asteroids,...ufos,...coinMeshes].forEach(o=>{if(o.mesh)scene.remove(o.mesh);});
  if(bossData)scene.remove(bossData.mesh);
  if(laserMesh)scene.remove(laserMesh);
  blackholes.forEach(b=>{if(b.mesh)scene.remove(b.mesh);});
  pBullets=[];eBullets2=[];asteroids=[];ufos=[];coinMeshes=[];bossData=null;laserMesh=null;blackholes=[];
}

// ──────────────────────────────────────────────
// SPAWN WAVE
// ──────────────────────────────────────────────
function spawnWave(){
  clearAll();
  document.getElementById('boss-bar').style.display='none';
  const isBoss=level%5===0;

  if(isBoss){
    bossWarnTimer=220;SFX.boss();
    animWarn('⚠ BOSS INCOMING ⚠');
    setTimeout(()=>{
      if(gState!=='playing')return;
      const mesh=buildBoss();mesh.position.set(0,2,-22);scene.add(mesh);
      bossData={mesh,hp:50+level*14,maxHp:50+level*14,dx:0.045+level*0.006,phase:0,enraged:false,shieldActive:false,shieldTimer:0,shootTimer:0,pattern:0};
      document.getElementById('boss-bar').style.display='block';
      updateBossBar();
    },3800);
  } else {
    const numAsteroids=6+level*2;
    for(let i=0;i<numAsteroids;i++){
      const r=0.75+Math.random()*0.95;
      const type=level>4&&Math.random()<0.28?'armored':level>7&&Math.random()<0.22?'exploding':'normal';
      const mesh=buildAsteroid(r,type);
      mesh.position.set((Math.random()-0.5)*32,-40-i*7+Math.random()*3,(Math.random()-0.5)*6-4);
      scene.add(mesh);
      asteroids.push({mesh,hp:type==='armored'?4:1,maxHp:type==='armored'?4:1,type,r,
        vx:(Math.random()-0.5)*0.065,vy:0.055+Math.random()*level*0.013,
        rx:Math.random()*0.018,ry:Math.random()*0.022,rz:Math.random()*0.016});
    }

    if(level>1){
      const numUFOs=Math.min(3+level,12);
      for(let i=0;i<numUFOs;i++){
        const type=level>2&&i%5===0?'kamikaze':level>4&&i%4===0?'shielded':level>6&&i%6===0?'splitter':level>8&&i%7===0?'elite':'normal';
        const mesh=buildUFO(type);
        const x=-11+(i%5)*5.5;mesh.position.set(x,-30-Math.floor(i/5)*6,(Math.random()*4-6));
        scene.add(mesh);
        ufos.push({mesh,hp:type==='shielded'?4:type==='elite'?3:1,maxHp:type==='shielded'?4:type==='elite'?3:1,
          type,dx:0.045+level*0.009,shootTimer:50+Math.random()*100,bobOff:Math.random()*Math.PI*2,phase:0});
      }
    }
  }
}

// ──────────────────────────────────────────────
// SHOOT
// ──────────────────────────────────────────────
function shoot(){
  if(shipCooldown>0)return;
  const rate=Math.max(4,15-STATS.fireRate*2);
  shipCooldown=rate;
  const wl=Math.min(STATS.weaponLevel,4);
  const dmg=1+STATS.damage*0.6;
  const pos=shipMesh.position.clone();

  if(wl===0){firePlayerBullet(pos,0,dmg,'pulse');SFX.shoot();}
  else if(wl===1){[-0.55,0,0.55].forEach(ox=>{const p=pos.clone();p.x+=ox;firePlayerBullet(p,0,dmg,'pulse');});SFX.shoot();}
  else if(wl===2){fireLaser(pos,dmg);SFX.laser();}
  else if(wl===3){firePlayerBullet(pos,0,dmg*1.4,'missile',nearestEnemy());SFX.missile();}
  else if(wl===4){firePlayerBullet(pos,0,dmg*2.5,'plasma');SFX.plasma();}
}

function firePlayerBullet(pos,dx,dmg,type,target=null){
  const mesh=makePBullet(type);mesh.position.copy(pos);scene.add(mesh);
  pBullets.push({mesh,dx,dz:-0.5,dmg,type,target,life:1.5});
}

function fireLaser(pos,dmg){
  if(laserMesh){scene.remove(laserMesh);}
  const h=80;
  const geo=new THREE.CylinderGeometry(0.06,0.1,h,8);
  const mat=new THREE.MeshStandardMaterial({color:0xff00ff,emissive:0xff00ff,emissiveIntensity:5,transparent:true,opacity:0.85});
  laserMesh=new THREE.Mesh(geo,mat);
  laserMesh.position.set(pos.x,pos.y,pos.z-h/2);
  scene.add(laserMesh);
  const ll=new THREE.PointLight(0xff00ff,5,10);laserMesh.add(ll);
  setTimeout(()=>{if(laserMesh){scene.remove(laserMesh);laserMesh=null;}},200);
  // instant damage along beam
  [...asteroids,...ufos].forEach(e=>{
    if(Math.abs(e.mesh.position.x-pos.x)<1.8){
      e.hp-=dmg*3;
      burst(e.mesh.position,0xff00ff,8,3);
      if(e.hp<=0)killEntity(e,asteroids.includes(e)?asteroids:ufos);
    }
  });
  if(bossData&&Math.abs(bossData.mesh.position.x-pos.x)<5&&!bossData.shieldActive){bossData.hp-=dmg*2;}
}

function nearestEnemy(){
  let best=null,bd=9999;
  [...asteroids,...ufos].forEach(e=>{const d=e.mesh.position.distanceTo(shipMesh.position);if(d<bd){bd=d;best=e;}});
  return best;
}

function spawnEBullet(pos,dx,dz){
  const mesh=makeEBullet();mesh.position.copy(pos);scene.add(mesh);
  eBullets2.push({mesh,dx,dz});
}

// SPECIAL WEAPON
// ──────────────────────────────────────────────
function useSpecial(){
  if(specialCharge<SPEC_MAX)return;
  specialCharge=0;SFX.freeze();
  const lv=STATS.specialPower;
  if(lv<=1){
    freezeTimer=200+lv*70;
    renderer.toneMappingExposure=2.2;setTimeout(()=>renderer.toneMappingExposure=1.1,350);
    animWarn('TIME FROZEN');
  } else if(lv<=3){
    const bh={pos:shipMesh.position.clone(),pos2:new THREE.Vector3(shipMesh.position.x,shipMesh.position.y,shipMesh.position.z-8),r:0,maxR:6+lv*2,life:1,pullR:14+lv*5};
    const geo=new THREE.SphereGeometry(1,14,14);
    const mat=new THREE.MeshStandardMaterial({color:0x000000,emissive:0x440088,emissiveIntensity:3,transparent:true,opacity:0.92});
    bh.mesh=new THREE.Mesh(geo,mat);bh.mesh.position.copy(bh.pos2);scene.add(bh.mesh);
    const bl=new THREE.PointLight(0x8800ff,4,12);bh.mesh.add(bl);
    blackholes.push(bh);SFX.blackhole();animWarn('BLACK HOLE');
  } else {
    [...asteroids,...ufos].forEach(e=>{burst(e.mesh.position,0xffaa00,20,7);scene.remove(e.mesh);SFX.explode();});

    renderer.toneMappingExposure=5;setTimeout(()=>renderer.toneMappingExposure=1.1,600);
    animWarn('NOVA BOMB');
  }
}

// ──────────────────────────────────────────────
// UPGRADES
// ──────────────────────────────────────────────
function openUpgrades(){
  const grid=document.getElementById('upg-grid');grid.innerHTML='';
  document.getElementById('uc-val').textContent=coins;
  UPG_TREE.forEach((u,i)=>{
    const maxed=STATS[u.id]>=u.max;
    const cost=UPG_COST[Math.min(STATS[u.id],UPG_COST.length-1)];
    const can=coins>=cost&&!maxed;
    const d=document.createElement('div');
    d.className='uc2'+(maxed?' maxed':can?'':' poor');
    d.innerHTML=`<div class="ui">${u.icon}</div><div class="un">[${i+1}] ${u.label}</div><div class="ud">${u.desc}</div><div class="ubar-bg"><div class="ubar" style="width:${(STATS[u.id]/u.max)*100}%"></div></div><div class="ucost">${maxed?'MAX':cost+' ⬡'}</div>`;
    d.onclick=()=>{buyUpgrade(i);openUpgrades();};grid.appendChild(d);
  });
  document.getElementById('upg').classList.add('show');
}
function buyUpgrade(i){
  const u=UPG_TREE[i];if(!u)return;
  if(STATS[u.id]>=u.max)return;
  const cost=UPG_COST[Math.min(STATS[u.id],UPG_COST.length-1)];
  if(coins<cost)return;
  coins-=cost;STATS[u.id]++;
  if(u.id==='hull')lives=Math.min(lives+1,3+STATS.hull);
  SFX.levelup();updateHUD();openUpgrades();
}
function launchNextWave(){
  document.getElementById('upg').classList.remove('show');
  gState='playing';spawnWave();
}

// ──────────────────────────────────────────────
// KILL ENTITY
// ──────────────────────────────────────────────
function killEntity(e,arr){
  burst(e.mesh.position,e.mesh.userData.glowColor||0xff8800,18,5);
  SFX.explode();scene.remove(e.mesh);
  const idx=arr.indexOf(e);if(idx>=-0)arr.splice(idx,1);
  score+=20*level;coins+=25;
  // drop coin
  const cm=makeCoin3D();cm.position.copy(e.mesh.position);scene.add(cm);
  coinMeshes.push({mesh:cm,vy:0.03,life:1.5});
  SFX.coin();
  // streak
  const now=frame;
  if(now-lastKillF<130){killStreak++;streakTimer=130;}else{killStreak=1;}
  lastKillF=now;updateHUD();
}

// ──────────────────────────────────────────────
// TAKE DAMAGE
// ──────────────────────────────────────────────
function takeDamage(){
  if(shipInvincible>0)return;
  SFX.hit();shake=0.45;shipInvincible=100;
  burst(shipMesh.position,0xff4400,16,5);
  lives--;updateHUD();
  if(lives<=0){
    if(score>hiScore)hiScore=score;
    gState='gameover';SFX.explode(true);setTimeout(()=>SFX.explode(true),180);
    const ov=document.getElementById('overlay');
    ov.querySelector('h1').textContent='GAME OVER';
    ov.querySelector('.sub').textContent='Mission Failed';
    ov.querySelector('.controls').innerHTML=`Score: ${score.toLocaleString()}<br>Level: ${level}<br>${score>=hiScore&&score>0?'🏆 New High Score!':'Best: '+hiScore.toLocaleString()}`;
    document.getElementById('cta-txt').textContent='Tap or Space to Retry';
    ov.classList.remove('hide');
  }
}

// ──────────────────────────────────────────────
// HUD
// ──────────────────────────────────────────────
function updateHUD(){
  document.getElementById('score').textContent=score.toLocaleString();
  document.getElementById('lvl').textContent='Level '+level;
  document.getElementById('coins').textContent='⬡ '+coins;
  for(let i=1;i<=3;i++){const h=document.getElementById('h'+i);if(h)h.className='hrt'+(i>lives?' off':'');}
  document.getElementById('wpn-name').textContent=WPN_NAMES[Math.min(STATS.weaponLevel,4)];
  const pct=(specialCharge/SPEC_MAX)*100;
  document.getElementById('sp-fill').style.width=pct+'%';
  document.getElementById('sp-lbl').textContent=specialCharge>=SPEC_MAX?'SPECIAL READY':'special';
  document.getElementById('sp-lbl').style.color=specialCharge>=SPEC_MAX?'rgba(255,170,0,0.9)':'rgba(255,255,255,0.22)';
  if(killStreak>=3&&streakTimer>0){
    const sw=document.getElementById('streak');
    sw.style.opacity=1;
    sw.textContent=killStreak>=10?'GODLIKE ×'+killStreak:killStreak>=7?'UNSTOPPABLE ×'+killStreak:killStreak>=5?'RAMPAGE ×'+killStreak:'STREAK ×'+killStreak;
  } else document.getElementById('streak').style.opacity=0;
}
function updateBossBar(){
  if(!bossData)return;
  document.getElementById('boss-fill').style.width=(bossData.hp/bossData.maxHp*100)+'%';
}
function animWarn(txt){
  const w=document.getElementById('warn');w.textContent=txt;w.style.opacity=1;
  setTimeout(()=>{w.style.transition='opacity 1s';w.style.opacity=0;setTimeout(()=>w.style.transition='',1100);},1800);
}

// ──────────────────────────────────────────────
// MAIN GAME LOOP
// ──────────────────────────────────────────────
const clock=new THREE.Clock();
function gameLoop(){
  requestAnimationFrame(gameLoop);
  const dt=Math.min(clock.getDelta(),0.05);
  frame++;

  // particles
  for(let i=activeP.length-1;i>=0;i--){
    const p=activeP[i];
    p.m.position.addScaledVector(p.v,dt*55);
    p.v.multiplyScalar(0.93);p.life-=p.dec;
    p.m.material.opacity=Math.max(0,p.life);
    p.m.scale.setScalar(p.scale*Math.max(0.1,p.life));
    if(p.life<=0){p.m.visible=false;pPool.push(p.m);activeP.splice(i,1);}
  }

  // stars drift
  starfield.rotation.z+=0.00008;starfield.position.z=(starfield.position.z+0.015)%2;

  if(gState!=='playing'){renderer.render(scene,camera);return;}

  // timers
  if(freezeTimer>0)freezeTimer--;
  if(bossWarnTimer>0)bossWarnTimer--;
  if(streakTimer>0)streakTimer--;else if(streakTimer===0){killStreak=0;}
  if(shipCooldown>0)shipCooldown--;
  if(shipInvincible>0)shipInvincible--;
  if(specialCharge<SPEC_MAX)specialCharge+=0.42;
  updateHUD();

  // SHIP MOVEMENT
  if(shipMesh){
    const spd=(0.13+STATS.speed*0.025)*(freezeTimer>0?0.28:1);
    const lx=KEYS['ArrowLeft']||JOY.dx<-0.15,rx=KEYS['ArrowRight']||JOY.dx>0.15;
    const uz=KEYS['ArrowUp']||JOY.dy<-0.15,dz=KEYS['ArrowDown']||JOY.dy>0.15;
    if(lx)shipMesh.position.x=Math.max(-14,shipMesh.position.x-spd*(KEYS['ArrowLeft']?1:Math.abs(JOY.dx)));
    if(rx)shipMesh.position.x=Math.min(14,shipMesh.position.x+spd*(KEYS['ArrowRight']?1:JOY.dx));
    if(uz)shipMesh.position.z=Math.max(-4,shipMesh.position.z-spd*(KEYS['ArrowUp']?1:Math.abs(JOY.dy)));
    if(dz)shipMesh.position.z=Math.min(12,shipMesh.position.z+spd*(KEYS['ArrowDown']?1:JOY.dy));
    if(KEYS[' ']||tFire)shoot();
    // tilt on turn
    const tiltT=(lx?0.38:rx?-0.38:0);
    shipMesh.rotation.z+=(tiltT-shipMesh.rotation.z)*0.1;
    shipMesh.rotation.x+=((-0.08)-shipMesh.rotation.x)*0.05;
    // engine pulse
    const eL=shipMesh.userData.cEngLight;if(eL){eL.intensity=3.5+Math.sin(frame*0.28)*1.2;}
    const eM=shipMesh.userData.cEngMat;if(eM){eM.emissiveIntensity=3+Math.sin(frame*0.28)*1;}
    // invincible flicker
    shipMesh.visible=!(shipInvincible>0&&Math.floor(shipInvincible/7)%2===0);
    // point light follows ship
    shipLight.position.copy(shipMesh.position);
    // camera smooth follow
    camera.position.x+=(shipMesh.position.x*0.18-camera.position.x)*0.04;
  }

  // PLAYER BULLETS
  for(let i=pBullets.length-1;i>=0;i--){
    const b=pBullets[i];
    if(b.type==='missile'&&b.target&&b.target.mesh){
      const dir=b.target.mesh.position.clone().sub(b.mesh.position).normalize();
      b.dx+=(dir.x*0.5-b.dx)*0.1;
      b.mesh.position.x+=b.dx*0.4;b.mesh.position.z+=b.dz;
    } else {b.mesh.position.x+=b.dx;b.mesh.position.z+=b.dz;}
    if(b.type==='plasma')b.mesh.scale.setScalar(0.95+Math.sin(frame*0.4)*0.1);
    b.life-=0.012;
    if(b.mesh.position.z<-50||b.life<=0){scene.remove(b.mesh);pBullets.splice(i,1);}
  }

  // ENEMY BULLETS
  for(let i=eBullets2.length-1;i>=0;i--){
    const b=eBullets2[i];b.mesh.position.x+=b.dx;b.mesh.position.z+=b.dz;
    if(b.mesh.position.z>20){scene.remove(b.mesh);eBullets2.splice(i,1);continue;}
    if(shipMesh&&shipMesh.visible&&b.mesh.position.distanceTo(shipMesh.position)<1.1){
      burst(b.mesh.position,0xff4400,8,3);scene.remove(b.mesh);eBullets2.splice(i,1);takeDamage();
    }
  }

  // ASTEROIDS
  for(let i=asteroids.length-1;i>=0;i--){
    const a=asteroids[i];
    if(!freezeTimer){a.mesh.position.x+=a.vx;a.mesh.position.z+=a.vy;a.mesh.rotation.x+=a.rx;a.mesh.rotation.y+=a.ry;a.mesh.rotation.z+=a.rz;}
    if(a.mesh.position.x<-18||a.mesh.position.x>18)a.vx*=-1;
    if(a.mesh.position.z>18){burst(a.mesh.position,0x664422,8,3);scene.remove(a.mesh);asteroids.splice(i,1);continue;}
    if(shipMesh&&shipMesh.visible&&a.mesh.position.distanceTo(shipMesh.position)<a.r+0.75){
      burst(a.mesh.position,0xff8833,14,4);scene.remove(a.mesh);asteroids.splice(i,1);takeDamage();continue;
    }
    // vs player bullets
    let hit=false;
    for(let bi=pBullets.length-1;bi>=0&&!hit;bi--){
      const b=pBullets[bi];if(!b)continue;
      if(b.mesh.position.distanceTo(a.mesh.position)<a.r+0.38){
        a.hp-=b.dmg;burst(b.mesh.position,0xff8833,8,3);
        if(b.type!=='plasma'){scene.remove(b.mesh);pBullets.splice(bi,1);}
        if(a.hp<=0){
          if(a.type==='exploding'){burst(a.mesh.position,0xff4400,30,7);renderer.toneMappingExposure=2;setTimeout(()=>renderer.toneMappingExposure=1.1,300);}
          killEntity(a,asteroids);i=Math.min(i,asteroids.length-1);
        }
        hit=true;
      }
    }
  }

  // UFOs
  for(let i=ufos.length-1;i>=0;i--){
    const u=ufos[i];u.phase+=0.04;
    if(!freezeTimer){
      u.mesh.rotation.y+=0.035;
      // bob up/down
      u.mesh.position.y=Math.sin(u.phase+u.bobOff)*0.3;
      // rim lights pulse
      const rl=u.mesh.children.filter(c=>c.isPointLight);if(rl.length)rl[0].intensity=2+Math.sin(u.phase*2)*1;

      if(u.type==='kamikaze'&&shipMesh){
        const dir=shipMesh.position.clone().sub(u.mesh.position).normalize();
        u.mesh.position.addScaledVector(dir,0.11+level*0.012);
      } else {
        u.mesh.position.x+=u.dx;
        if(u.mesh.position.x>14||u.mesh.position.x<-14)u.dx*=-1;
      }
      u.shootTimer--;
      if(u.shootTimer<=0&&u.type!=='kamikaze'&&shipMesh){
        const dir2=shipMesh.position.clone().sub(u.mesh.position).normalize();
        const spread=u.type==='elite'?3:1;
        for(let s=0;s<spread;s++){
          const angle=(s-Math.floor(spread/2))*0.15;
          spawnEBullet(u.mesh.position.clone(),(dir2.x+angle)*0.12,dir2.z*0.14);
        }
        u.shootTimer=55+Math.random()*80;SFX.alien();
      }
    }
    if(u.mesh.position.z>18){scene.remove(u.mesh);ufos.splice(i,1);continue;}
    if(shipMesh&&shipMesh.visible&&u.mesh.position.distanceTo(shipMesh.position)<1.7){
      burst(u.mesh.position,0x44ff88,14,4);scene.remove(u.mesh);ufos.splice(i,1);takeDamage();continue;
    }
    let hit=false;
    for(let bi=pBullets.length-1;bi>=0&&!hit;bi--){
      const b=pBullets[bi];if(!b)continue;
      if(b.mesh.position.distanceTo(u.mesh.position)<1.55){
        if(u.type==='shielded'&&u.hp===u.maxHp){burst(b.mesh.position,0xaa44ff,6,2);if(b.type!=='plasma'){scene.remove(b.mesh);pBullets.splice(bi,1);}hit=true;continue;}
        u.hp-=b.dmg;burst(b.mesh.position,new THREE.Color(u.mesh.userData.glowColor||0x44ff88).getHex(),8,3);
        if(b.type!=='plasma'){scene.remove(b.mesh);pBullets.splice(bi,1);}
        if(u.hp<=0){
          if(u.type==='splitter'){
            for(let s=0;s<2;s++){
              const nm=buildUFO('normal');nm.scale.setScalar(0.6);nm.position.copy(u.mesh.position);nm.position.x+=s*3-1.5;scene.add(nm);
              ufos.push({mesh:nm,hp:1,maxHp:1,type:'normal',dx:u.dx*(s===0?1.2:-1.2),shootTimer:70,bobOff:Math.random()*Math.PI*2,phase:0});
            }
          }
          killEntity(u,ufos);i=Math.min(i,ufos.length-1);
        }
        hit=true;
      }
    }
  }

  // BOSS
  if(bossData&&bossData.mesh){
    const B=bossData;B.phase+=0.025;
    if(!freezeTimer){
      B.mesh.position.x+=B.dx;if(B.mesh.position.x>13||B.mesh.position.x<-13)B.dx*=-1;
      B.mesh.rotation.y+=0.008;
      if(B.mesh.userData.ring)B.mesh.userData.ring.rotation.z+=0.02;
      if(B.mesh.userData.ring0)B.mesh.userData.ring0.rotation.x+=0.015;
      if(B.mesh.userData.ring1)B.mesh.userData.ring1.rotation.z-=0.012;
      // eye pulse
      if(B.mesh.userData.eyeLight)B.mesh.userData.eyeLight.intensity=4+Math.sin(B.phase*3)*2;
      // enrage
      if(!B.enraged&&B.hp<B.maxHp*0.45){
        B.enraged=true;B.dx*=1.65;SFX.explode(true);
        if(B.mesh.userData.coreLight)B.mesh.userData.coreLight.color.set(0xff0000);
        animWarn('⚠ ENRAGED ⚠');
      }
      // shooting patterns
      B.shootTimer++;const brate=B.enraged?18:Math.max(22,50-level*2);
      if(B.shootTimer>=brate){
        B.shootTimer=0;
        const pat=B.pattern%4;B.pattern++;
        if(pat===0){// spread
          [-0.2,-0.1,0,0.1,0.2].forEach(da=>{if(shipMesh){const dir=shipMesh.position.clone().sub(B.mesh.position).normalize();spawnEBullet(B.mesh.position.clone().add(new THREE.Vector3(0,-1,0)),dir.x*0.14+da,dir.z*0.14);}});
        } else if(pat===1){// circle
          for(let k=0;k<10;k++){const a=(Math.PI*2/10)*k+B.phase;spawnEBullet(B.mesh.position.clone(),Math.cos(a)*0.13,Math.sin(a)*0.13);}
        } else if(pat===2){// aimed burst
          if(shipMesh){const dir=shipMesh.position.clone().sub(B.mesh.position).normalize();[-0.12,0,0.12].forEach(da=>spawnEBullet(B.mesh.position.clone(),dir.x*0.2+da,dir.z*0.2));}
        } else {// spiral
          for(let k=0;k<6;k++){const a=(Math.PI*2/6)*k+B.phase*2;spawnEBullet(B.mesh.position.clone(),Math.cos(a)*0.12,Math.sin(a)*0.12);}
        }
        SFX.alien();
      }
    }
    // vs player bullets
    for(let bi=pBullets.length-1;bi>=0;bi--){
      const b=pBullets[bi];if(!b)continue;
      if(!B.shieldActive&&b.mesh.position.distanceTo(B.mesh.position)<5){
        B.hp-=b.dmg;shake=0.2;SFX.hit();
        burst(b.mesh.position,0xff4400,8,4);
        if(b.type!=='plasma'){scene.remove(b.mesh);pBullets.splice(bi,1);}
        updateBossBar();
        if(B.hp<=0){
          burst(B.mesh.position,0xff4400,60,8);burst(B.mesh.position,0xffaa00,40,6);burst(B.mesh.position,0xffffff,20,5);
          score+=600*level;coins+=250;SFX.explode(true);setTimeout(()=>SFX.explode(true),160);setTimeout(()=>SFX.explode(true),380);
          shake=0.9;renderer.toneMappingExposure=5;setTimeout(()=>renderer.toneMappingExposure=1.1,700);
          scene.remove(B.mesh);bossData=null;
          document.getElementById('boss-bar').style.display='none';
          updateHUD();animWarn('BOSS DESTROYED');
        }
        break;
      }
    }
    if(bossData)updateBossBar();
  }

  // BLACKHOLES
  for(let i=blackholes.length-1;i>=0;i--){
    const bh=blackholes[i];bh.r=Math.min(bh.maxR,bh.r+0.06);bh.life-=0.007;
    if(bh.mesh)bh.mesh.scale.setScalar(bh.r*0.5);
    [...asteroids,...ufos].forEach(e=>{
      const d=e.mesh.position.distanceTo(bh.pos2);
      if(d<bh.pullR){const dir=bh.pos2.clone().sub(e.mesh.position).normalize();e.mesh.position.addScaledVector(dir,0.05*(1-d/bh.pullR)*50*dt);}
      if(d<bh.r*1.5){killEntity(e,asteroids.includes(e)?asteroids:ufos);}
    });
    if(bh.life<=0){if(bh.mesh)scene.remove(bh.mesh);blackholes.splice(i,1);}
  }

  // COINS
  for(let i=coinMeshes.length-1;i>=0;i--){
    const co=coinMeshes[i];co.mesh.position.z+=co.vy;co.mesh.rotation.y+=0.08;co.life-=0.006;
    if(shipMesh){
      const d=co.mesh.position.distanceTo(shipMesh.position);
      const mr=1.8+STATS.coinMagnet*3;
      if(d<mr){const dir=shipMesh.position.clone().sub(co.mesh.position).normalize();co.mesh.position.addScaledVector(dir,0.18+STATS.coinMagnet*0.1);}
      if(d<1.0){coins+=10;SFX.coin();co.life=0;updateHUD();}
    }
    if(co.life<=0||co.mesh.position.z>22){scene.remove(co.mesh);coinMeshes.splice(i,1);}
  }

  // CAMERA SHAKE
  if(shake>0){
    camera.position.x+=(Math.random()-0.5)*shake;
    camera.position.y+=(Math.random()-0.5)*shake*0.5;
    shake*=0.82;if(shake<0.005)shake=0;
  } else {
    camera.position.y+=(9-camera.position.y)*0.04;
  }

  // WAVE CLEAR
  if(asteroids.length===0&&ufos.length===0&&!bossData&&bossWarnTimer===0&&gState==='playing'){
    level++;if(score>hiScore)hiScore=score;SFX.levelup();
    gState='upgrade';openUpgrades();updateHUD();
  }

  renderer.render(scene,camera);
}

updateHUD();
gameLoop();
</script>
