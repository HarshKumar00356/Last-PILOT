<!DOCTYPE html>
<html>
<head>
<title>Last Pilot</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;font-family:'Segoe UI',Arial,sans-serif}
#c{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#score-wrap{position:absolute;top:20px;left:50%;transform:translateX(-50%);text-align:center}
#score-val{font-size:clamp(22px,4vw,36px);font-weight:200;color:#fff;letter-spacing:4px}
#level-val{font-size:clamp(10px,2vw,13px);color:rgba(255,255,255,0.4);letter-spacing:6px;text-transform:uppercase;margin-top:2px}
#lives-wrap{position:absolute;top:22px;right:24px;display:flex;gap:8px;align-items:center}
.heart{width:10px;height:10px;background:#ff4455;border-radius:50%;box-shadow:0 0 8px #ff4455}
.heart.dead{background:rgba(255,255,255,0.1);box-shadow:none}
#weapon-wrap{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);text-align:center}
#weapon-name{font-size:clamp(10px,2vw,12px);color:rgba(0,200,255,0.7);letter-spacing:5px;text-transform:uppercase}
#special-bar-wrap{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);width:120px}
#special-bar-bg{width:100%;height:2px;background:rgba(255,255,255,0.1);border-radius:2px}
#special-bar{height:2px;background:#ffaa00;border-radius:2px;width:0%;transition:width 0.1s;box-shadow:0 0 6px #ffaa00}
#special-label{font-size:10px;color:rgba(255,170,0,0.6);letter-spacing:4px;text-transform:uppercase;text-align:center;margin-top:4px}
#coins-wrap{position:absolute;top:22px;left:24px;font-size:clamp(12px,2.5vw,16px);color:#ffdd00;letter-spacing:2px;font-weight:300}
#streak-wrap{position:absolute;top:18%;left:50%;transform:translateX(-50%);text-align:center;opacity:0;transition:opacity 0.3s}
#streak-txt{font-size:clamp(14px,3vw,22px);color:#ffcc00;letter-spacing:4px;font-weight:300;text-transform:uppercase}
/* SCREENS */
#screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.82);backdrop-filter:blur(4px)}
#screen.hidden{display:none}
#screen h1{font-size:clamp(28px,7vw,64px);font-weight:100;color:#fff;letter-spacing:12px;text-transform:uppercase;margin-bottom:8px}
#screen .sub{font-size:clamp(10px,2vw,13px);color:rgba(255,255,255,0.35);letter-spacing:6px;text-transform:uppercase;margin-bottom:48px}
#screen .info{font-size:clamp(11px,2vw,14px);color:rgba(255,255,255,0.55);letter-spacing:2px;line-height:2.2;text-align:center;margin-bottom:40px}
#screen .cta{font-size:clamp(11px,2vw,13px);color:rgba(0,255,200,0.7);letter-spacing:6px;text-transform:uppercase;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
/* UPGRADE SCREEN */
#upg-screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,5,0.9);backdrop-filter:blur(6px)}
#upg-screen.show{display:flex}
#upg-title{font-size:clamp(16px,3.5vw,28px);font-weight:100;color:#fff;letter-spacing:10px;text-transform:uppercase;margin-bottom:6px}
#upg-coins{font-size:clamp(12px,2.5vw,18px);color:#ffdd00;letter-spacing:4px;margin-bottom:32px}
#upg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:min(640px,92vw);margin-bottom:24px}
.upg-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:14px 12px;cursor:pointer;transition:all 0.2s;text-align:center}
.upg-card:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,220,0,0.4)}
.upg-card.maxed{border-color:rgba(0,255,100,0.3)}
.upg-card.cant{opacity:0.4}
.upg-icon{font-size:clamp(18px,4vw,26px);margin-bottom:6px}
.upg-name{font-size:clamp(10px,2vw,13px);color:#fff;letter-spacing:2px;font-weight:300;margin-bottom:3px}
.upg-desc{font-size:clamp(9px,1.6vw,11px);color:rgba(255,255,255,0.35);letter-spacing:1px;line-height:1.5}
.upg-cost{font-size:clamp(9px,1.6vw,11px);color:#ffdd00;margin-top:6px;letter-spacing:2px}
.upg-bar-bg{width:100%;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;margin-top:6px}
.upg-bar{height:2px;background:#ffdd00;border-radius:2px}
#upg-cta{font-size:clamp(10px,2vw,12px);color:rgba(0,255,180,0.6);letter-spacing:6px;text-transform:uppercase;animation:pulse 2s ease-in-out infinite;margin-top:8px}
/* MOBILE */
#jzone{position:fixed;left:0;bottom:0;width:48vw;height:42vh;z-index:15}
#jpad{position:absolute;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);bottom:28px;left:28px;display:flex;align-items:center;justify-content:center}
#jknob{width:40px;height:40px;border-radius:50%;background:rgba(0,180,255,0.25);border:1px solid rgba(0,200,255,0.45);position:absolute}
#fzone{position:fixed;right:0;bottom:0;width:52vw;height:42vh;z-index:15;display:flex;align-items:center;justify-content:center;gap:20px}
.fbtn{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:400;letter-spacing:2px;user-select:none;border:1px solid;text-transform:uppercase}
#fb-fire{background:rgba(0,200,255,0.1);border-color:rgba(0,200,255,0.35);color:rgba(0,200,255,0.7)}
#fb-spec{background:rgba(255,150,0,0.1);border-color:rgba(255,150,0,0.35);color:rgba(255,150,0,0.7)}
</style>
</head>
<body>
<!-- HUD -->
<div id="hud">
  <div id="score-wrap"><div id="score-val">0</div><div id="level-val">Level 1</div></div>
  <div id="lives-wrap"><div class="heart" id="h1"></div><div class="heart" id="h2"></div><div class="heart" id="h3"></div></div>
  <div id="coins-wrap">⬡ <span id="coins-val">0</span></div>
  <div id="streak-wrap"><div id="streak-txt"></div></div>
  <div id="weapon-wrap">
    <div id="special-bar-wrap"><div id="special-bar-bg"><div id="special-bar"></div></div><div id="special-label">special</div></div>
    <div id="weapon-name">Pulse Cannon</div>
  </div>
</div>

<!-- INTRO SCREEN -->
<div id="screen">
  <h1>Last Pilot</h1>
  <div class="sub">Earth's Final Defense</div>
  <div class="info" id="screen-info">
    Arrow keys / Joystick — Move<br>
    Space / Fire — Shoot<br>
    Z / Special — Special Weapon<br>
    Destroy everything. Don't die.
  </div>

</div>

<!-- UPGRADE SCREEN -->
<div id="upg-screen">
  <div id="upg-title">Upgrade Hangar</div>
  <div id="upg-coins">⬡ <span id="upg-coins-val">0</span></div>
  <div id="upg-grid"></div>
  <div id="upg-cta">Enter / Fire — Next Wave</div>
</div>

<!-- MOBILE CONTROLS -->
<div id="jzone"><div id="jpad"><div id="jknob"></div></div></div>
<div id="fzone">
  <div class="fbtn" id="fb-spec">SPEC</div>
  <div class="fbtn" id="fb-fire">FIRE</div>
</div>

<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════
//  AUDIO
// ═══════════════════════════════════════════════
const AC = new (window.AudioContext || window.webkitAudioContext)();
function ra(){ if(AC.state==='suspended') AC.resume(); }
function tone(f,t,d,v=0.25,sw=null){
  ra();
  const o=AC.createOscillator(), g=AC.createGain(), dist=AC.createWaveShaper();
  const curve=new Float32Array(256);for(let i=0;i<256;i++)curve[i]=((i/128-1));
  dist.curve=curve;
  o.connect(dist);dist.connect(g);g.connect(AC.destination);
  o.type=t;o.frequency.setValueAtTime(f,AC.currentTime);
  if(sw)o.frequency.exponentialRampToValueAtTime(sw,AC.currentTime+d);
  g.gain.setValueAtTime(v,AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
  o.start();o.stop(AC.currentTime+d+0.01);
}
function noise(d,v=0.3){
  ra();
  const buf=AC.createBuffer(1,AC.sampleRate*d,AC.sampleRate);
  const data=buf.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=Math.random()*2-1;
  const src=AC.createBufferSource();src.buffer=buf;
  const g=AC.createGain();const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=800;
  src.connect(f);f.connect(g);g.connect(AC.destination);
  g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.0001,AC.currentTime+d);
  src.start();src.stop(AC.currentTime+d+0.01);
}
const snd={
  shoot:()=>{tone(900,'square',0.08,0.12,300);},
  laser:()=>{tone(1400,'sawtooth',0.18,0.15,180);},
  missile:()=>{tone(280,'sawtooth',0.1,0.18,900);},
  plasma:()=>{tone(600,'sine',0.12,0.15,200);tone(300,'sawtooth',0.12,0.08,150);},
  explode:(big=false)=>{noise(big?0.6:0.35,big?0.5:0.32);tone(big?60:100,'sawtooth',big?0.5:0.3,big?0.35:0.22,big?15:18);},
  hit:()=>{noise(0.18,0.28);tone(150,'sawtooth',0.15,0.2,40);},
  coin:()=>{tone(1200,'sine',0.07,0.15);setTimeout(()=>tone(1600,'sine',0.07,0.12),60);},
  levelup:()=>{[300,420,560,750,1000].forEach((f,i)=>setTimeout(()=>tone(f,'sine',0.2,0.18),i*80));},
  boss:()=>{[80,60,100,50].forEach((f,i)=>setTimeout(()=>tone(f,'sawtooth',0.4,0.38),i*250));},
  freeze:()=>{tone(800,'sine',0.5,0.2,50);},
  blackhole:()=>{tone(55,'sine',0.6,0.4,25);},
  alien:()=>{tone(550,'triangle',0.1,0.1,220);}
};

// ═══════════════════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════════════════
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000005);
scene.fog = new THREE.FogExp2(0x000005,0.008);

const camera = new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,8,22);
camera.lookAt(0,0,0);

window.addEventListener('resize',()=>{
  renderer.setSize(window.innerWidth,window.innerHeight);
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});

// Lighting
const ambLight=new THREE.AmbientLight(0x111133,0.8);scene.add(ambLight);
const dirLight=new THREE.DirectionalLight(0x4488ff,1.5);dirLight.position.set(5,10,5);dirLight.castShadow=true;scene.add(dirLight);
const rimLight=new THREE.DirectionalLight(0xff4422,0.6);rimLight.position.set(-8,-5,-10);scene.add(rimLight);
const pointLight1=new THREE.PointLight(0x00aaff,2,30);scene.add(pointLight1);

// Stars (particle system)
const starGeo=new THREE.BufferGeometry();
const starPos=new Float32Array(3000);
for(let i=0;i<3000;i+=3){starPos[i]=(Math.random()-0.5)*300;starPos[i+1]=(Math.random()-0.5)*300;starPos[i+2]=(Math.random()-0.5)*200-50;}
starGeo.setAttribute('position',new THREE.BufferAttribute(starPos,3));
const starMat=new THREE.PointsMaterial({color:0xffffff,size:0.25,sizeAttenuation:true});
const starField=new THREE.Points(starGeo,starMat);scene.add(starField);

// ═══════════════════════════════════════════════
//  SHIP MODEL
// ═══════════════════════════════════════════════
function buildShip(){
  const group=new THREE.Group();
  // body
  const bodyGeo=new THREE.ConeGeometry(0.6,3.2,8);
  const bodyMat=new THREE.MeshStandardMaterial({color:0x99ccff,metalness:0.9,roughness:0.1,emissive:0x0022aa,emissiveIntensity:0.2});
  const body=new THREE.Mesh(bodyGeo,bodyMat);body.rotation.x=Math.PI/2;body.castShadow=true;group.add(body);
  // cockpit
  const cockpitGeo=new THREE.SphereGeometry(0.4,12,8,0,Math.PI*2,0,Math.PI/2);
  const cockpitMat=new THREE.MeshStandardMaterial({color:0x88ccff,metalness:0.2,roughness:0.0,emissive:0x0066ff,emissiveIntensity:0.4,transparent:true,opacity:0.85});
  const cockpit=new THREE.Mesh(cockpitGeo,cockpitMat);cockpit.position.z=-0.6;group.add(cockpit);
  // wings
  const wingShape=new THREE.Shape();wingShape.moveTo(0,-0.1);wingShape.lineTo(2.2,-1.2);wingShape.lineTo(2.0,-0.6);wingShape.lineTo(0.3,0.4);
  const wingGeo=new THREE.ExtrudeGeometry(wingShape,{depth:0.07,bevelEnabled:false});
  const wingMat=new THREE.MeshStandardMaterial({color:0x4477bb,metalness:0.8,roughness:0.2,emissive:0x001133,emissiveIntensity:0.3});
  const wingL=new THREE.Mesh(wingGeo,wingMat);wingL.rotation.x=Math.PI/2;wingL.position.set(-0.1,0,0.2);group.add(wingL);
  const wingR=wingL.clone();wingR.scale.x=-1;group.add(wingR);
  // engine glow
  const engineGeo=new THREE.CylinderGeometry(0.25,0.35,0.5,12);
  const engineMat=new THREE.MeshStandardMaterial({color:0x0055ff,emissive:0x0033ff,emissiveIntensity:3,metalness:0.5,roughness:0.3});
  const engine=new THREE.Mesh(engineGeo,engineMat);engine.position.z=1.4;engine.rotation.x=Math.PI/2;group.add(engine);
  // engine light
  const eLight=new THREE.PointLight(0x0088ff,3,5);eLight.position.z=1.8;group.add(eLight);
  group.userData.engineLight=eLight;
  group.userData.engineMat=engineMat;
  return group;
}

// ═══════════════════════════════════════════════
//  ASTEROID MODEL
// ═══════════════════════════════════════════════
function buildAsteroid(radius,type='normal'){
  const detail=type==='armored'?2:1;
  const geo=new THREE.IcosahedronGeometry(radius,detail);
  const pos=geo.attributes.position;
  for(let i=0;i<pos.count;i++){
    pos.setXYZ(i,pos.getX(i)+(Math.random()-0.5)*radius*0.4,pos.getY(i)+(Math.random()-0.5)*radius*0.4,pos.getZ(i)+(Math.random()-0.5)*radius*0.4);
  }
  geo.computeVertexNormals();
  const colors={normal:{color:0x886644,metalness:0.1,roughness:0.9,emissive:0x221100,emissiveIntensity:0.1},armored:{color:0x3355aa,metalness:0.8,roughness:0.2,emissive:0x001144,emissiveIntensity:0.3},exploding:{color:0xcc3300,metalness:0.2,roughness:0.7,emissive:0x441100,emissiveIntensity:0.5}};
  const cfg=colors[type]||colors.normal;
  const mat=new THREE.MeshStandardMaterial(cfg);
  const mesh=new THREE.Mesh(geo,mat);mesh.castShadow=true;
  if(type==='armored'){const glow=new THREE.PointLight(0x2244ff,1,radius*4);mesh.add(glow);}
  if(type==='exploding'){const glow=new THREE.PointLight(0xff4400,1.5,radius*5);mesh.add(glow);}
  return mesh;
}

// ═══════════════════════════════════════════════
//  ALIEN MODEL
// ═══════════════════════════════════════════════
function buildAlien(type='normal'){
  const g=new THREE.Group();
  const colors={normal:0x22aa44,kamikaze:0xff5500,shielded:0xaa33ff,splitter:0xdddd00};
  const col=colors[type]||colors.normal;
  // body saucer
  const bodyGeo=new THREE.CylinderGeometry(1.1,0.7,0.4,16);
  const bodyMat=new THREE.MeshStandardMaterial({color:col,metalness:0.7,roughness:0.3,emissive:new THREE.Color(col).multiplyScalar(0.3),emissiveIntensity:0.6});
  const body=new THREE.Mesh(bodyGeo,bodyMat);g.add(body);
  // dome
  const domeGeo=new THREE.SphereGeometry(0.6,12,8,0,Math.PI*2,0,Math.PI/2);
  const domeMat=new THREE.MeshStandardMaterial({color:0xaaddff,metalness:0.1,roughness:0.0,transparent:true,opacity:0.75,emissive:0x0044aa,emissiveIntensity:0.4});
  const dome=new THREE.Mesh(domeGeo,domeMat);dome.position.y=0.3;g.add(dome);
  // eyes
  [-0.3,0.3].forEach(x=>{
    const eyeGeo=new THREE.SphereGeometry(0.12,8,8);
    const eyeMat=new THREE.MeshStandardMaterial({color:0xff0044,emissive:0xff0022,emissiveIntensity:3});
    const eye=new THREE.Mesh(eyeGeo,eyeMat);eye.position.set(x,0.35,0.45);g.add(eye);
    const eLight=new THREE.PointLight(0xff0044,1.5,2);eLight.position.copy(eye.position);g.add(eLight);
  });
  // glow light
  const gl=new THREE.PointLight(col,2,4);gl.position.y=0;g.add(gl);
  if(type==='shielded'){
    const shieldGeo=new THREE.SphereGeometry(1.5,16,16);
    const shieldMat=new THREE.MeshStandardMaterial({color:0xaa44ff,transparent:true,opacity:0.18,emissive:0x8822ff,emissiveIntensity:1,wireframe:false,side:THREE.DoubleSide});
    const shield=new THREE.Mesh(shieldGeo,shieldMat);g.add(shield);g.userData.shieldMesh=shield;
  }
  return g;
}

// ═══════════════════════════════════════════════
//  BOSS MODEL
// ═══════════════════════════════════════════════
function buildBoss(){
  const g=new THREE.Group();
  // core sphere
  const coreGeo=new THREE.SphereGeometry(3,20,20);
  const coreMat=new THREE.MeshStandardMaterial({color:0xff2200,metalness:0.6,roughness:0.4,emissive:0xff1100,emissiveIntensity:0.5});
  const core=new THREE.Mesh(coreGeo,coreMat);g.add(core);
  // rings
  [4.5,5.5,6.2].forEach((r,i)=>{
    const rGeo=new THREE.TorusGeometry(r,0.15,8,48);
    const rMat=new THREE.MeshStandardMaterial({color:0xff5500,emissive:0xff3300,emissiveIntensity:1.5,metalness:0.8,roughness:0.2});
    const ring=new THREE.Mesh(rGeo,rMat);ring.rotation.x=Math.PI/2*(i%2===0?1:0.7);ring.rotation.z=i*0.5;g.add(ring);
  });
  // spikes
  for(let i=0;i<12;i++){
    const sGeo=new THREE.ConeGeometry(0.3,2.5,6);
    const sMat=new THREE.MeshStandardMaterial({color:0xff3300,metalness:0.7,roughness:0.3,emissive:0xff1100,emissiveIntensity:0.5});
    const spike=new THREE.Mesh(sGeo,sMat);
    const a=(Math.PI*2/12)*i;spike.position.set(Math.cos(a)*3.5,Math.sin(a)*3.5,0);spike.rotation.z=-a-Math.PI/2;g.add(spike);
  }
  // eye
  const eyeGeo=new THREE.SphereGeometry(1.2,16,16);
  const eyeMat=new THREE.MeshStandardMaterial({color:0xffff00,emissive:0xffcc00,emissiveIntensity:3});
  const eye=new THREE.Mesh(eyeGeo,eyeMat);eye.position.z=2.5;g.add(eye);
  const eyeLight=new THREE.PointLight(0xffff00,4,10);eyeLight.position.copy(eye.position);g.add(eyeLight);
  // boss light
  const bLight=new THREE.PointLight(0xff4400,5,20);g.add(bLight);
  g.userData.rings=g.children.filter(c=>c.geometry&&c.geometry.type==='TorusGeometry');
  return g;
}

// ═══════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════
const particlePool=[];
function getParticle(){
  if(particlePool.length){const p=particlePool.pop();p.visible=true;return p;}
  const geo=new THREE.SphereGeometry(0.12,4,4);
  const mat=new THREE.MeshBasicMaterial({color:0xff8800});
  const m=new THREE.Mesh(geo,mat);scene.add(m);return m;
}
function releaseParticle(p){p.visible=false;particlePool.push(p);}
const activeParticles=[];
function spawnParticles3D(pos,color,count=12,speed=4){
  for(let i=0;i<count;i++){
    const p=getParticle();p.material.color.set(color);
    p.position.copy(pos);
    const v=new THREE.Vector3((Math.random()-0.5),(Math.random()-0.5),(Math.random()-0.5)).normalize().multiplyScalar(speed*(0.3+Math.random()));
    activeParticles.push({mesh:p,vel:v,life:1,decay:0.025+Math.random()*0.02});
  }
}

// ═══════════════════════════════════════════════
//  BULLETS
// ═══════════════════════════════════════════════
function makeBullet(type='normal'){
  if(type==='plasma'){
    const geo=new THREE.SphereGeometry(0.35,8,8);
    const mat=new THREE.MeshStandardMaterial({color:0xaa00ff,emissive:0x8800ff,emissiveIntensity:4,transparent:true,opacity:0.9});
    const m=new THREE.Mesh(geo,mat);const l=new THREE.PointLight(0xaa00ff,3,4);m.add(l);return m;
  }
  if(type==='homing'){
    const geo=new THREE.ConeGeometry(0.12,0.8,6);
    const mat=new THREE.MeshStandardMaterial({color:0xffaa00,emissive:0xff8800,emissiveIntensity:3});
    const m=new THREE.Mesh(geo,mat);const l=new THREE.PointLight(0xffaa00,2,3);m.add(l);return m;
  }
  const geo=new THREE.CylinderGeometry(0.04,0.04,0.8,6);
  const mat=new THREE.MeshStandardMaterial({color:0x00ffff,emissive:0x00ffff,emissiveIntensity:4});
  const m=new THREE.Mesh(geo,mat);const l=new THREE.PointLight(0x00ffff,2,3);m.add(l);return m;
}
function makeEnemyBullet(){
  const geo=new THREE.SphereGeometry(0.18,6,6);
  const mat=new THREE.MeshStandardMaterial({color:0xff4400,emissive:0xff2200,emissiveIntensity:3});
  const m=new THREE.Mesh(geo,mat);const l=new THREE.PointLight(0xff4400,2,3);m.add(l);return m;
}

//  GAME STATE
// ═══════════════════════════════════════════════
let gameState='intro'; // intro playing upgrade gameover
let score=0,coins=0,lives=3,level=1,frame=0,hiScore=0;
let freezeTimer=0,bossWarning=0,shakeAmt=0;
let killStreak=0,streakTimer=0,lastKillFrame=0;
let specialCharge=0; const specialMax=300;

const stats={fireRate:0,damage:0,speed:0,hull:0,weaponLevel:0,specialPower:0,coinMagnet:0};
const upgradeTree=[
  {id:'fireRate',label:'Fire Rate',icon:'⚡',desc:'Shoot faster',max:5},
  {id:'damage',label:'Damage',icon:'💥',desc:'Stronger bullets',max:5},
  {id:'speed',label:'Engine',icon:'🚀',desc:'Move faster',max:5},
  {id:'hull',label:'Hull',icon:'🛡️',desc:'+1 life',max:3},
  {id:'weaponLevel',label:'Weapon',icon:'🔫',desc:'Unlock weapons',max:4},
  {id:'specialPower',label:'Special',icon:'🌀',desc:'Better special',max:5},
  {id:'coinMagnet',label:'Magnet',icon:'🧲',desc:'Attract coins',max:3},
];
const upgradeCost=[50,120,250,500,1000];
const weaponNames=['Pulse Cannon','Triple Shot','Laser Beam','Homing Missiles','Plasma Orbs'];

// Ship state
const shipState={x:0,z:0,velX:0,invincible:0,cooldown:0,rate:15};
let shipMesh=null;

// Collections
let bullets=[],eBullets=[],asteroidObjs=[],alienObjs=[],coinObjs=[],bossObj=null,blackholes=[];
let laserBeamMesh=null;

// ═══════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════
const keys={};
const joy={dx:0,dy:0};
let touchFire=false,touchSpecial=false;
document.addEventListener('keydown',e=>{keys[e.key]=true;ra();handleKey(e.key);});
document.addEventListener('keyup',e=>keys[e.key]=false);

function handleKey(k){
  if(k===' '){
    if(gameState==='intro'){startGame();}
    else if(gameState==='gameover'){restartGame();}
    else if(gameState==='upgrade'){startNextLevel();}
    else tryShoot();
  }
  if((k==='z'||k==='Z')&&gameState==='playing') useSpecial();
  if(gameState==='upgrade'){
    const n=parseInt(k);if(n>=1&&n<=upgradeTree.length)buyUpgrade(n-1);
    if(k==='Enter')startNextLevel();
  }
}

// Joystick
const jpad=document.getElementById('jpad'),jknob=document.getElementById('jknob'),jzone=document.getElementById('jzone');
jzone.addEventListener('touchstart',e=>{ra();const t=e.touches[0];const r=jpad.getBoundingClientRect();jzone._sx=r.left+r.width/2;jzone._sy=r.top+r.height/2;},{passive:true});
jzone.addEventListener('touchmove',e=>{const t=e.touches[0];const dx=t.clientX-jzone._sx,dy=t.clientY-jzone._sy;const dist=Math.hypot(dx,dy),max=42;const cl=Math.min(dist,max),ang=Math.atan2(dy,dx);joy.dx=Math.cos(ang)*(cl/max);joy.dy=Math.sin(ang)*(cl/max);jknob.style.transform=`translate(${Math.cos(ang)*cl}px,${Math.sin(ang)*cl}px)`;},{passive:true});
jzone.addEventListener('touchend',()=>{joy.dx=0;joy.dy=0;jknob.style.transform='';});
document.getElementById('fb-fire').addEventListener('touchstart',e=>{ra();touchFire=true;if(gameState==='intro')startGame();else if(gameState==='gameover')restartGame();else if(gameState==='upgrade')startNextLevel();},{passive:true});
document.getElementById('fb-fire').addEventListener('touchend',()=>touchFire=false);
document.getElementById('fb-spec').addEventListener('touchstart',e=>{ra();if(gameState==='playing')useSpecial();},{passive:true});

// ═══════════════════════════════════════════════
//  GAME INIT
// ═══════════════════════════════════════════════
function startGame(){
  document.getElementById('screen').classList.add('hidden');
  gameState='playing';
  if(!shipMesh){shipMesh=buildShip();scene.add(shipMesh);}
  shipState.x=0;shipState.z=0;
  shipMesh.position.set(0,0,8);
  spawnWave();
}

function restartGame(){
  document.getElementById('screen').classList.add('hidden');
  // clear everything
  [...bullets,...eBullets,...asteroidObjs,...alienObjs,...coinObjs].forEach(o=>scene.remove(o.mesh||o));
  if(bossObj){scene.remove(bossObj.mesh);}
  bullets=[];eBullets=[];asteroidObjs=[];alienObjs=[];coinObjs=[];bossObj=null;blackholes=[];
  if(laserBeamMesh){scene.remove(laserBeamMesh);laserBeamMesh=null;}
  score=0;coins=0;lives=3;level=1;frame=0;killStreak=0;specialCharge=0;
  Object.keys(stats).forEach(k=>stats[k]=0);
  shipState.invincible=0;shipState.cooldown=0;
  updateHUD();
  if(!shipMesh){shipMesh=buildShip();scene.add(shipMesh);}
  shipMesh.position.set(0,0,8);
  gameState='playing';spawnWave();
}

// ═══════════════════════════════════════════════
//  WAVE
// ═══════════════════════════════════════════════
function spawnWave(){
  bullets=[];eBullets=[];asteroidObjs=[];alienObjs=[];
  if(laserBeamMesh){scene.remove(laserBeamMesh);laserBeamMesh=null;}
  blackholes=[];bossObj=null;

  const isBoss=level%5===0;
  if(isBoss){
    bossWarning=200;snd.boss();
    setTimeout(()=>{
      const mesh=buildBoss();mesh.position.set(0,0,-18);scene.add(mesh);
      bossObj={mesh,hp:40+level*12,maxHp:40+level*12,dx:0.04+level*0.006,shootTimer:0,phase:0,enraged:false,shieldActive:false,shieldTimer:0};
    },3500);
  } else {
    const ac=5+level*2;
    for(let i=0;i<ac;i++){
      const r=0.8+Math.random()*0.9;
      const type=level>4&&Math.random()<0.3?'armored':level>7&&Math.random()<0.2?'exploding':'normal';
      const mesh=buildAsteroid(r,type);
      const x=(Math.random()-0.5)*28;mesh.position.set(x,-30-i*8,(-Math.random()*8));
      scene.add(mesh);
      asteroidObjs.push({mesh,hp:type==='armored'?3:1,maxHp:type==='armored'?3:1,type,r,vx:(Math.random()-0.5)*0.06,vy:0.05+Math.random()*level*0.012,rx:Math.random()*0.02,ry:Math.random()*0.02,rz:Math.random()*0.02});
    }
    if(level>1){
      const alc=Math.min(4+level,14);
      for(let i=0;i<alc;i++){
        const type=level>3&&i%4===0?'kamikaze':level>5&&i%5===0?'shielded':level>6&&i%6===0?'splitter':'normal';
        const mesh=buildAlien(type);
        const x=-10+(i%5)*5;mesh.position.set(x,-25-Math.floor(i/5)*5,(-Math.random()*4-2));
        scene.add(mesh);
        alienObjs.push({mesh,hp:type==='shielded'?3:1,maxHp:type==='shielded'?3:1,type,dx:0.04+level*0.008,shootTimer:60+Math.random()*100,ey:0});
      }
    }
  }
}

// ═══════════════════════════════════════════════
//  SHOOTING
// ═══════════════════════════════════════════════
function tryShoot(){
  if(shipState.cooldown>0)return;
  const rate=Math.max(4,shipState.rate-stats.fireRate*2);
  shipState.cooldown=rate;
  const wl=Math.min(stats.weaponLevel,4);
  const pos=shipMesh.position.clone();
  const dmg=1+stats.damage;

  if(wl===0){spawnBullet(pos,0,dmg,'normal');snd.shoot();}
  else if(wl===1){[-0.5,0,0.5].forEach(ox=>{const p=pos.clone();p.x+=ox;spawnBullet(p,0,dmg,'normal');});snd.shoot();}
  else if(wl===2){spawnLaserBeam(pos,dmg);snd.laser();}
  else if(wl===3){const target=nearestEnemy();spawnBullet(pos,0,dmg,'homing',target);snd.missile();}
  else if(wl===4){spawnBullet(pos,0,dmg*3,'plasma');snd.plasma();}
  updateHUD();
}

function spawnBullet(pos,dx,dmg,type,target=null){
  const mesh=makeBullet(type);mesh.position.copy(pos);scene.add(mesh);
  if(type==='normal')mesh.rotation.z=Math.PI/2;
  bullets.push({mesh,dx,dy:-0.55,dmg,type,target,life:1});
}

function spawnLaserBeam(pos,dmg){
  if(laserBeamMesh){scene.remove(laserBeamMesh);}
  const h=60;const geo=new THREE.CylinderGeometry(0.05,0.08,h,8);
  const mat=new THREE.MeshStandardMaterial({color:0xff00ff,emissive:0xff00ff,emissiveIntensity:5,transparent:true,opacity:0.8});
  laserBeamMesh=new THREE.Mesh(geo,mat);
  laserBeamMesh.position.set(pos.x,pos.y-h/2-1,pos.z);scene.add(laserBeamMesh);
  const l=new THREE.PointLight(0xff00ff,4,8);laserBeamMesh.add(l);
  setTimeout(()=>{if(laserBeamMesh){scene.remove(laserBeamMesh);laserBeamMesh=null;}},200);
  // damage
  [...asteroidObjs,...alienObjs].forEach(e=>{
    if(Math.abs(e.mesh.position.x-pos.x)<1.5){e.hp-=dmg*2;if(e.hp<=0)killObj(e,'enemy');}
  });
  if(bossObj&&Math.abs(bossObj.mesh.position.x-pos.x)<5&&!bossObj.shieldActive){bossObj.hp-=dmg;}
}

function spawnEnemyBullet(pos,dx,dy){
  const mesh=makeEnemyBullet();mesh.position.copy(pos);scene.add(mesh);
  eBullets.push({mesh,dx,dy});
}

function nearestEnemy(){
  let best=null,bd=9999;
  [...asteroidObjs,...alienObjs].forEach(e=>{const d=e.mesh.position.distanceTo(shipMesh.position);if(d<bd){bd=d;best=e;}});
  return best;
}

// ═══════════════════════════════════════════════
//  SPECIAL
// ═══════════════════════════════════════════════
function useSpecial(){
  if(specialCharge<specialMax)return;
  specialCharge=0;
  const lv=stats.specialPower;
  if(lv<=1){
    freezeTimer=180+lv*60;snd.freeze();
    // visual flash
    renderer.toneMappingExposure=2.5;setTimeout(()=>renderer.toneMappingExposure=1.2,300);
  } else if(lv<=3){
    const pos=shipMesh.position.clone();pos.z-=6;
    const bh={pos,r:0,maxR:5+lv*2,life:1,pullR:12+lv*4};
    blackholes.push(bh);snd.blackhole();
    // visual black hole sphere
    const geo=new THREE.SphereGeometry(1,16,16);
    const mat=new THREE.MeshStandardMaterial({color:0x000000,emissive:0x330066,emissiveIntensity:2,transparent:true,opacity:0.9});
    bh.mesh=new THREE.Mesh(geo,mat);bh.mesh.position.copy(pos);scene.add(bh.mesh);
    const l=new THREE.PointLight(0x8800ff,5,15);bh.mesh.add(l);
  } else {
    asteroidObjs.forEach(a=>{spawnParticles3D(a.mesh.position,0xff8800,16);scene.remove(a.mesh);snd.explode();});
    alienObjs.forEach(a=>{spawnParticles3D(a.mesh.position,0x44ff88,16);scene.remove(a.mesh);snd.explode();});
    asteroidObjs=[];alienObjs=[];if(bossObj)bossObj.hp=Math.max(1,bossObj.hp-30);
    renderer.toneMappingExposure=4;setTimeout(()=>renderer.toneMappingExposure=1.2,500);
  }
  updateHUD();
}

// ═══════════════════════════════════════════════
//  UPGRADES
// ═══════════════════════════════════════════════
function openUpgradeShop(){
  document.getElementById('upg-screen').classList.add('show');
  renderUpgradeUI();
}
function renderUpgradeUI(){
  document.getElementById('upg-coins-val').textContent=coins;
  const grid=document.getElementById('upg-grid');grid.innerHTML='';
  upgradeTree.forEach((u,i)=>{
    const maxed=stats[u.id]>=u.max;
    const cost=upgradeCost[Math.min(stats[u.id],upgradeCost.length-1)];
    const canAfford=coins>=cost;
    const card=document.createElement('div');
    card.className='upg-card'+(maxed?' maxed':canAfford?'':' cant');
    card.innerHTML=`<div class="upg-icon">${u.icon}</div><div class="upg-name">[${i+1}] ${u.label}</div><div class="upg-desc">${u.desc}</div><div class="upg-bar-bg"><div class="upg-bar" style="width:${(stats[u.id]/u.max)*100}%"></div></div><div class="upg-cost">${maxed?'MAX':cost+' ⬡'}</div>`;
    card.onclick=()=>{buyUpgrade(i);renderUpgradeUI();};
    grid.appendChild(card);
  });
}
function buyUpgrade(i){
  const u=upgradeTree[i];if(!u)return;
  if(stats[u.id]>=u.max)return;
  const cost=upgradeCost[Math.min(stats[u.id],upgradeCost.length-1)];
  if(coins<cost)return;
  coins-=cost;stats[u.id]++;
  if(u.id==='hull'){lives=Math.min(lives+1,3+stats.hull);}
  snd.levelup();updateHUD();renderUpgradeUI();
}
function startNextLevel(){
  document.getElementById('upg-screen').classList.remove('show');
  gameState='playing';spawnWave();
}

// ═══════════════════════════════════════════════
//  KILL / DAMAGE
// ═══════════════════════════════════════════════
function killObj(obj,source){
  spawnParticles3D(obj.mesh.position,source==='enemy'?0xff8800:0x44ff88,18,5);
  snd.explode();scene.remove(obj.mesh);
  score+=20*level;coins+=25;
  const now=frame;
  if(now-lastKillFrame<120){killStreak++;streakTimer=120;}else{killStreak=1;}
  lastKillFrame=now;
  // spawn coin 3D
  const cGeo=new THREE.SphereGeometry(0.15,6,6);
  const cMat=new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0xffaa00,emissiveIntensity:2});
  const cMesh=new THREE.Mesh(cGeo,cMat);cMesh.position.copy(obj.mesh.position);scene.add(cMesh);
  const cl=new THREE.PointLight(0xffdd00,2,3);cMesh.add(cl);
  coinObjs.push({mesh:cMesh,vy:0.02,life:1});
  snd.coin();updateHUD();
}

function takeDamage(){
  if(shipState.invincible>0)return;
  snd.hit();shakeAmt=0.4;shipState.invincible=100;
  spawnParticles3D(shipMesh.position,0xff4400,16,5);
  lives--;updateHUD();
  if(lives<=0){
    if(score>hiScore)hiScore=score;
    gameState='gameover';snd.explode(true);setTimeout(()=>snd.explode(true),200);
    const screen=document.getElementById('screen');
    screen.querySelector('h1').textContent='GAME OVER';
    screen.querySelector('.sub').textContent='Mission Failed';
    screen.querySelector('#screen-info').innerHTML=`Score: ${score.toLocaleString()}<br>Level: ${level}<br>${score>=hiScore&&score>0?'NEW HIGH SCORE!':'Best: '+hiScore.toLocaleString()}`;
    screen.querySelector('#screen-cta').textContent='Tap or Space to Retry';
    screen.classList.remove('hidden');
  }
}

// ═══════════════════════════════════════════════
//  HUD UPDATE
// ═══════════════════════════════════════════════
function updateHUD(){
  document.getElementById('score-val').textContent=score.toLocaleString();
  document.getElementById('level-val').textContent='Level '+level;
  document.getElementById('coins-val').textContent=coins;
  for(let i=1;i<=3;i++){const h=document.getElementById('h'+i);if(h)h.className='heart'+(i>lives?' dead':'');}
  document.getElementById('weapon-name').textContent=weaponNames[Math.min(stats.weaponLevel,4)];
  const pct=(specialCharge/specialMax)*100;
  document.getElementById('special-bar').style.width=pct+'%';
  document.getElementById('special-label').textContent=specialCharge>=specialMax?'SPECIAL READY':'special';
  document.getElementById('special-label').style.color=specialCharge>=specialMax?'rgba(255,170,0,0.9)':'rgba(255,255,255,0.25)';
}

// ═══════════════════════════════════════════════
//  MAIN GAME LOOP
// ═══════════════════════════════════════════════
const clock=new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  const dt=clock.getDelta();
  frame++;

  // particles
  for(let i=activeParticles.length-1;i>=0;i--){
    const p=activeParticles[i];
    p.mesh.position.add(p.vel.clone().multiplyScalar(dt*60));
    p.vel.multiplyScalar(0.94);p.life-=p.decay;
    p.mesh.material.opacity=p.life;p.mesh.material.transparent=true;
    if(p.life<=0){releaseParticle(p.mesh);activeParticles.splice(i,1);}
  }

  // star rotation (parallax)
  starField.rotation.y+=0.0001;starField.rotation.x+=0.00005;

  if(gameState!=='playing'){renderer.render(scene,camera);return;}

  // special charge
  if(specialCharge<specialMax)specialCharge+=0.4;
  updateHUD();

  // streak
  if(streakTimer>0){
    streakTimer--;
    const sw=document.getElementById('streak-wrap');
    const st=document.getElementById('streak-txt');
    if(killStreak>=3){
      sw.style.opacity=1;
      st.textContent=killStreak>=10?'GODLIKE ×'+killStreak:killStreak>=7?'UNSTOPPABLE ×'+killStreak:killStreak>=5?'RAMPAGE ×'+killStreak:'STREAK ×'+killStreak;
    }
  } else {
    document.getElementById('streak-wrap').style.opacity=0;killStreak=0;
  }

  // boss warning
  if(bossWarning>0){bossWarning--;}

  // ship movement
  if(gameState==='playing'&&shipMesh){
    const spd=(0.12+stats.speed*0.025)*(freezeTimer>0?0.3:1);
    if(keys['ArrowLeft']||joy.dx<-0.15)shipMesh.position.x=Math.max(-13,shipMesh.position.x-spd*(keys['ArrowLeft']?1:Math.abs(joy.dx)));
    if(keys['ArrowRight']||joy.dx>0.15)shipMesh.position.x=Math.min(13,shipMesh.position.x+spd*(keys['ArrowRight']?1:joy.dx));
    if(keys['ArrowUp']||joy.dy<-0.15)shipMesh.position.z=Math.max(-5,shipMesh.position.z-spd*(keys['ArrowUp']?1:Math.abs(joy.dy)));
    if(keys['ArrowDown']||joy.dy>0.15)shipMesh.position.z=Math.min(12,shipMesh.position.z+spd*(keys['ArrowDown']?1:joy.dy));
    if(keys[' ']||touchFire)tryShoot();
    if(shipState.cooldown>0)shipState.cooldown--;
    if(shipState.invincible>0)shipState.invincible--;
    // tilt
    const tiltTarget=(keys['ArrowLeft']||joy.dx<-0.2)?0.35:(keys['ArrowRight']||joy.dx>0.2)?-0.35:0;
    shipMesh.rotation.z+=(tiltTarget-shipMesh.rotation.z)*0.12;
    // engine pulse
    const el=shipMesh.userData.engineLight;if(el)el.intensity=2.5+Math.sin(frame*0.3)*0.8;
    const em=shipMesh.userData.engineMat;if(em)em.emissiveIntensity=2.5+Math.sin(frame*0.3)*1;
    // camera follows ship
    camera.position.x+=(shipMesh.position.x*0.25-camera.position.x)*0.05;
    pointLight1.position.copy(shipMesh.position);
  }

  if(freezeTimer>0)freezeTimer--;

  // bullets
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(b.type==='homing'&&b.target&&b.target.mesh){
      const dir=b.target.mesh.position.clone().sub(b.mesh.position).normalize();
      b.dx+=(dir.x-b.dx)*0.12;b.dy+=((dir.z*0.6)-b.dy)*0.12; // adjusted for 3D coords
      b.mesh.position.x+=b.dx;b.mesh.position.z+=b.dy;
    } else {b.mesh.position.x+=b.dx;b.mesh.position.z+=b.dy;}
    if(b.type==='plasma'){b.mesh.scale.setScalar(1+Math.sin(frame*0.3)*0.15);}
    if(b.mesh.position.z<-40||b.mesh.position.z>20){scene.remove(b.mesh);bullets.splice(i,1);}
  }

  // enemy bullets
  for(let i=eBullets.length-1;i>=0;i--){
    const b=eBullets[i];b.mesh.position.x+=b.dx;b.mesh.position.z+=b.dy;
    if(b.mesh.position.z>20){scene.remove(b.mesh);eBullets.splice(i,1);continue;}
    if(shipMesh&&b.mesh.position.distanceTo(shipMesh.position)<1.2){scene.remove(b.mesh);eBullets.splice(i,1);takeDamage();}
  }

  // asteroids
  for(let i=asteroidObjs.length-1;i>=0;i--){
    const a=asteroidObjs[i];
    if(!freezeTimer){a.mesh.position.x+=a.vx;a.mesh.position.z+=a.vy;a.mesh.rotation.x+=a.rx;a.mesh.rotation.y+=a.ry;a.mesh.rotation.z+=a.rz;}
    if(a.mesh.position.x<-15||a.mesh.position.x>15)a.vx*=-1;
    if(a.mesh.position.z>16){scene.remove(a.mesh);asteroidObjs.splice(i,1);continue;}
    if(shipMesh&&a.mesh.position.distanceTo(shipMesh.position)<a.r+0.8){scene.remove(a.mesh);asteroidObjs.splice(i,1);takeDamage();continue;}
    // bullet collision
    for(let bi=bullets.length-1;bi>=0;bi--){
      const b=bullets[bi];if(!b)continue;
      if(b.mesh.position.distanceTo(a.mesh.position)<a.r+0.3){
        a.hp-=b.dmg;spawnParticles3D(a.mesh.position,a.type==='armored'?0x4466ff:0xff8833,8,3);
        if(b.type!=='plasma'){scene.remove(b.mesh);bullets.splice(bi,1);}
        if(a.hp<=0){
          if(a.type==='exploding'){spawnParticles3D(a.mesh.position,0xff4400,30,7);renderer.toneMappingExposure=2;setTimeout(()=>renderer.toneMappingExposure=1.2,300);}
          killObj(a,'enemy');asteroidObjs.splice(i,1);
        }
        break;
      }
    }
  }

  // aliens
  for(let i=alienObjs.length-1;i>=0;i--){
    const a=alienObjs[i];a.ey+=0.05;
    if(!freezeTimer){
      if(a.type==='kamikaze'&&shipMesh){
        const dir=shipMesh.position.clone().sub(a.mesh.position).normalize();
        a.mesh.position.add(dir.multiplyScalar(0.1+level*0.015));
      } else {a.mesh.position.x+=a.dx;if(a.mesh.position.x>13||a.mesh.position.x<-13)a.dx*=-1;}
      a.mesh.rotation.y+=0.02;
      a.shootTimer--;
      if(a.shootTimer<=0&&a.type!=='kamikaze'&&shipMesh){
        const dir2=shipMesh.position.clone().sub(a.mesh.position).normalize();
        spawnEnemyBullet(a.mesh.position.clone(),dir2.x*0.12,dir2.z*0.12);
        a.shootTimer=60+Math.random()*80;snd.alien();
      }
    }
    if(a.mesh.position.z>16){scene.remove(a.mesh);alienObjs.splice(i,1);continue;}
    if(shipMesh&&a.mesh.position.distanceTo(shipMesh.position)<1.8){scene.remove(a.mesh);alienObjs.splice(i,1);takeDamage();continue;}
    for(let bi=bullets.length-1;bi>=0;bi--){
      const b=bullets[bi];if(!b)continue;
      if(b.mesh.position.distanceTo(a.mesh.position)<1.4){
        a.hp-=b.dmg;spawnParticles3D(a.mesh.position,0x44ff88,6,3);
        if(b.type!=='plasma'){scene.remove(b.mesh);bullets.splice(bi,1);}
        if(a.hp<=0){
          if(a.type==='splitter'&&a.mesh.scale.x>0.65){
            for(let s=0;s<2;s++){
              const nm=buildAlien('normal');nm.scale.setScalar(0.6);nm.position.copy(a.mesh.position);nm.position.x+=s*2-1;scene.add(nm);
              alienObjs.push({mesh:nm,hp:1,maxHp:1,type:'normal',dx:a.dx*(s===0?1:-1),shootTimer:80,ey:0});
            }
          }
          killObj(a,'enemy');alienObjs.splice(i,1);
        }
        break;
      }
    }
  }

  // boss
  if(bossObj&&bossObj.mesh){
    const b=bossObj;b.phase+=0.02;
    if(!freezeTimer){
      b.mesh.position.x+=b.dx;if(b.mesh.position.x>12||b.mesh.position.x<-12)b.dx*=-1;
      b.mesh.rotation.z+=0.008;b.mesh.rotation.y+=0.01;
      if(b.userData&&b.mesh.userData.rings)b.mesh.userData.rings.forEach((r,i)=>r.rotation.x+=0.01*(i%2===0?1:-1));
      if(!b.enraged&&b.hp<b.maxHp*0.4){b.enraged=true;b.dx*=1.7;snd.explode(true);}
      b.shootTimer++;
      const br=b.enraged?20:Math.max(25,50-level*2);
      if(b.shootTimer%br===0&&shipMesh){
        const patterns=[
          ()=>{[-0.15,-0.07,0,0.07,0.15].forEach(da=>{const dir=shipMesh.position.clone().sub(b.mesh.position).normalize();spawnEnemyBullet(b.mesh.position.clone(),dir.x*0.14+da,dir.z*0.14);});},
          ()=>{for(let k=0;k<8;k++){const a=(Math.PI*2/8)*k;spawnEnemyBullet(b.mesh.position.clone(),Math.cos(a)*0.12,Math.sin(a)*0.12);}},
          ()=>{if(shipMesh){const dir=shipMesh.position.clone().sub(b.mesh.position).normalize();[-0.1,0,0.1].forEach(da=>spawnEnemyBullet(b.mesh.position.clone(),dir.x*0.18+da,dir.z*0.18));}}
        ];
        patterns[Math.floor(b.shootTimer/br)%3]();b.shootTimer=0;snd.alien();
      }
    }
    // bullets vs boss
    for(let bi=bullets.length-1;bi>=0;bi--){
      const bl=bullets[bi];if(!bl)continue;
      if(!b.shieldActive&&bl.mesh.position.distanceTo(b.mesh.position)<4){
        b.hp-=bl.dmg;shakeAmt=0.2;snd.hit();
        spawnParticles3D(bl.mesh.position,0xff4400,8,4);
        if(bl.type!=='plasma'){scene.remove(bl.mesh);bullets.splice(bi,1);}
        if(b.hp<=0){
          spawnParticles3D(b.mesh.position,0xff4400,60,8);spawnParticles3D(b.mesh.position,0xffaa00,40,6);
          score+=500*level;coins+=200;snd.explode(true);setTimeout(()=>snd.explode(true),150);setTimeout(()=>snd.explode(true),350);
          shakeAmt=0.8;renderer.toneMappingExposure=5;setTimeout(()=>renderer.toneMappingExposure=1.2,600);
          scene.remove(b.mesh);bossObj=null;updateHUD();
        }
        break;
      }
    }
  }

  // blackholes
  for(let i=blackholes.length-1;i>=0;i--){
    const bh=blackholes[i];bh.r=Math.min(bh.maxR,bh.r+0.05);bh.life-=0.008;
    if(bh.mesh)bh.mesh.scale.setScalar(bh.r/1);
    [...asteroidObjs,...alienObjs].forEach(e=>{
      const d=e.mesh.position.distanceTo(bh.pos);
      if(d<bh.pullR){const dir=bh.pos.clone().sub(e.mesh.position).normalize();const force=3*(1-d/bh.pullR);e.mesh.position.add(dir.multiplyScalar(force*0.04));}
      if(d<bh.r){killObj(e,'enemy');asteroidObjs.includes(e)?asteroidObjs.splice(asteroidObjs.indexOf(e),1):alienObjs.splice(alienObjs.indexOf(e),1);}
    });
    if(bh.life<=0){if(bh.mesh)scene.remove(bh.mesh);blackholes.splice(i,1);}
  }

  // coins
  for(let i=coinObjs.length-1;i>=0;i--){
    const co=coinObjs[i];co.life-=0.005;co.mesh.position.z+=0.03;co.mesh.rotation.y+=0.08;
    if(shipMesh){
      const d=co.mesh.position.distanceTo(shipMesh.position);
      const magR=2+stats.coinMagnet*3;
      if(d<magR){const dir=shipMesh.position.clone().sub(co.mesh.position).normalize();co.mesh.position.add(dir.multiplyScalar(0.2+stats.coinMagnet*0.1));}
      if(d<1.2){coins+=10;snd.coin();co.life=0;updateHUD();}
    }
    if(co.life<=0||co.mesh.position.z>20){scene.remove(co.mesh);coinObjs.splice(i,1);}
  }

  // camera shake
  if(shakeAmt>0){
    camera.position.x+=(Math.random()-0.5)*shakeAmt;
    camera.position.y+=(Math.random()-0.5)*shakeAmt*0.5;
    shakeAmt*=0.85;if(shakeAmt<0.01)shakeAmt=0;
  }

  // wave clear check
  if(asteroidObjs.length===0&&alienObjs.length===0&&!bossObj&&bossWarning===0&&gameState==='playing'){
    level++;if(score>hiScore)hiScore=score;snd.levelup();
    gameState='upgrade';openUpgradeShop();updateHUD();
  }

  renderer.render(scene,camera);
}

updateHUD();
loop();
</script>
