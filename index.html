<!DOCTYPE html>
<html>
<head>
<title>Space Defender</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const W = c.width = 480;
const H = c.height = 640;

// AUDIO
const AC = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq, type, duration, vol=0.3) {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + duration);
  o.start(); o.stop(AC.currentTime + duration);
}

function shootSound() { beep(880, 'square', 0.1, 0.2); }
function explosionSound() {
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(150, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(20, AC.currentTime + 0.3);
  g.gain.setValueAtTime(0.5, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + 0.3);
  o.start(); o.stop(AC.currentTime + 0.3);
}
function levelUpSound() {
  [300,400,500,700].forEach((f,i) => setTimeout(() => beep(f,'sine',0.2,0.3), i*100));
}
function hitSound() { beep(200, 'sawtooth', 0.15, 0.4); }
function alienShootSound() { beep(440, 'triangle', 0.12, 0.15); }
function introMusic() {
  const notes = [261,294,330,349,392,440,494,523];
  notes.forEach((f,i) => setTimeout(() => beep(f,'sine',0.3,0.2), i*200));
}

// STATE
let state = 'intro'; // intro, playing, levelup, gameover
let score = 0, lives = 3, level = 1;
let frame = 0;
let shake = 0;
let upgradeOptions = [];

// UPGRADES
const upgrades = {
  tripleShot: false,
  shield: false,
  fastShot: false,
  speedBoost: false,
  bomb: false,
};
let shieldHP = 0;

// SHIP
const ship = { x: W/2, y: H - 80, w: 36, h: 36, speed: 5, shootCooldown: 0, shootRate: 18 };

// COLLECTIONS
let bullets = [], alienBullets = [], asteroids = [], aliens = [], particles = [], stars = [], powerups = [];
let bossHP = 0, boss = null;
const keys = {};

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    AC.resume();
    if (state === 'intro') { state = 'playing'; spawnStars(); spawnWave(); }
    else if (state === 'gameover') restartGame();
    else if (state === 'playing') tryShoot();
  }
  if (state === 'levelup' && (e.key === '1' || e.key === '2' || e.key === '3')) {
    applyUpgrade(upgradeOptions[parseInt(e.key)-1]);
    state = 'playing';
    spawnWave();
    levelUpSound();
  }
});
document.addEventListener('keyup', e => keys[e.key] = false);

function spawnStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, speed: Math.random()*1+0.3 });
  }
}

function spawnWave() {
  asteroids = []; aliens = []; boss = null; bullets = []; alienBullets = [];
  const isBossLevel = level % 5 === 0;
  if (isBossLevel) {
    boss = { x: W/2, y: 80, w: 70, h: 50, hp: 20 + level*5, maxHp: 20+level*5, dx: 2, shootTimer: 0 };
  } else {
    const asteroidCount = 3 + level * 2;
    for (let i = 0; i < asteroidCount; i++) {
      asteroids.push({
        x: Math.random()*(W-40)+20, y: -40 - i*60,
        r: 18 + Math.random()*14,
        dx: (Math.random()-0.5)*2,
        dy: 1.2 + Math.random()*level*0.4,
        hp: level > 3 ? 2 : 1,
        rot: 0, rotSpeed: (Math.random()-0.5)*0.05
      });
    }
    const alienCount = level > 2 ? 4 + level : 0;
    for (let i = 0; i < alienCount; i++) {
      aliens.push({
        x: 40 + (i % 6) * 70, y: 60 + Math.floor(i/6)*50,
        w: 30, h: 24,
        dx: 1.2 + level*0.2,
        shootTimer: Math.random()*120
      });
    }
  }
}

function tryShoot() {
  if (ship.shootCooldown > 0) return;
  const rate = upgrades.fastShot ? 8 : ship.shootRate;
  ship.shootCooldown = rate;
  if (upgrades.tripleShot) {
    bullets.push({x: ship.x, y: ship.y-10, dx:-3, dy:-10});
    bullets.push({x: ship.x, y: ship.y-10, dx:0, dy:-12});
    bullets.push({x: ship.x, y: ship.y-10, dx:3, dy:-10});
  } else {
    bullets.push({x: ship.x, y: ship.y-10, dx:0, dy:-12});
  }
  shootSound();
}

function spawnParticles(x, y, color, count=14) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = 1.5 + Math.random()*4;
    particles.push({ x, y, dx: Math.cos(angle)*spd, dy: Math.sin(angle)*spd, life: 1, color });
  }
}

function applyUpgrade(u) {
  if (!u) return;
  if (u === 'tripleShot') upgrades.tripleShot = true;
  if (u === 'shield') { upgrades.shield = true; shieldHP = 3; }
  if (u === 'fastShot') upgrades.fastShot = true;
  if (u === 'speedBoost') ship.speed = 8;
  if (u === 'bomb') {
    asteroids = []; aliens = [];
    spawnParticles(W/2, H/2, '#ffaa00', 40);
    explosionSound();
  }
}

function getUpgradeOptions() {
  const all = [
    { id: 'tripleShot', label: 'Triple Shot', desc: 'Fire 3 bullets at once', icon: '🔱' },
    { id: 'shield', label: 'Shield', desc: '3 hits protection', icon: '🛡️' },
    { id: 'fastShot', label: 'Rapid Fire', desc: '2x shooting speed', icon: '⚡' },
    { id: 'speedBoost', label: 'Speed Boost', desc: 'Move faster', icon: '💨' },
    { id: 'bomb', label: 'Nuke', desc: 'Clear entire screen', icon: '💣' },
  ];
  const available = all.filter(u => !upgrades[u.id] || u.id === 'bomb' || u.id === 'shield');
  const shuffled = available.sort(() => Math.random()-0.5);
  return shuffled.slice(0, 3);
}

function restartGame() {
  score = 0; lives = 3; level = 1; frame = 0;
  Object.keys(upgrades).forEach(k => upgrades[k] = false);
  ship.x = W/2; ship.y = H-80; ship.speed = 5; ship.shootRate = 18;
  shieldHP = 0; bullets = []; alienBullets = []; particles = []; powerups = [];
  spawnStars(); spawnWave();
  state = 'playing';
}

// DRAW FUNCTIONS
function drawStars() {
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${0.3+s.r*0.3})`;
    ctx.fill();
  });
}

function drawShip() {
  const x = ship.x, y = ship.y;
  ctx.save();
  // engine glow
  ctx.shadowColor = '#00aaff'; ctx.shadowBlur = 18;
  ctx.fillStyle = '#00aaff';
  ctx.beginPath();
  ctx.ellipse(x, y+20, 8, 14, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  // body
  ctx.fillStyle = '#aad4ff';
  ctx.beginPath();
  ctx.moveTo(x, y-20); ctx.lineTo(x+18, y+16); ctx.lineTo(x-18, y+16);
  ctx.closePath(); ctx.fill();
  // cockpit
  ctx.fillStyle = '#004488';
  ctx.beginPath();
  ctx.ellipse(x, y, 7, 10, 0, 0, Math.PI*2);
  ctx.fill();
  // wings
  ctx.fillStyle = '#5599cc';
  ctx.beginPath(); ctx.moveTo(x-18,y+16); ctx.lineTo(x-28,y+24); ctx.lineTo(x-6,y+16); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x+18,y+16); ctx.lineTo(x+28,y+24); ctx.lineTo(x+6,y+16); ctx.closePath(); ctx.fill();
  // shield
  if (upgrades.shield && shieldHP > 0) {
    ctx.strokeStyle = `rgba(0,200,255,${0.4+Math.sin(frame*0.1)*0.3})`;
    ctx.lineWidth = 3; ctx.shadowColor='#00ccff'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(x, y, 32, 0, Math.PI*2); ctx.stroke();
    ctx.shadowBlur=0; ctx.lineWidth=1;
  }
  ctx.restore();
}

function drawAsteroid(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.rotate(a.rot);
  ctx.fillStyle = a.hp > 1 ? '#cc7733' : '#886644';
  ctx.strokeStyle = '#ffaa55'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  const sides = 8;
  for (let i = 0; i < sides; i++) {
    const ang = (Math.PI*2/sides)*i;
    const r = a.r * (0.8 + Math.sin(i*2.3)*0.2);
    i===0 ? ctx.moveTo(Math.cos(ang)*r, Math.sin(ang)*r) : ctx.lineTo(Math.cos(ang)*r, Math.sin(ang)*r);
  }
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawAlien(a) {
  ctx.save();
  ctx.translate(a.x, a.y);
  ctx.fillStyle = '#44ff88';
  ctx.shadowColor = '#44ff88'; ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.ellipse(0, 0, 15, 10, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#002200';
  ctx.beginPath(); ctx.ellipse(0, -2, 7, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#44ff88';
  [-10,-5,5,10].forEach(ox => {
    ctx.beginPath(); ctx.arc(ox, 8, 3, 0, Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBoss() {
  if (!boss) return;
  ctx.save();
  ctx.translate(boss.x, boss.y);
  ctx.fillStyle = '#ff3300';
  ctx.shadowColor = '#ff3300'; ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.ellipse(0, 0, 35, 22, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff9900';
  ctx.beginPath(); ctx.ellipse(0, -5, 16, 13, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffff00';
  [-20,0,20].forEach(ox => {
    ctx.beginPath(); ctx.arc(ox, 15, 5, 0, Math.PI*2); ctx.fill();
  });
  ctx.shadowBlur = 0;
  // HP bar
  const bw = 120;
  ctx.fillStyle = '#333';
  ctx.fillRect(-bw/2, -40, bw, 8);
  ctx.fillStyle = `hsl(${(boss.hp/boss.maxHp)*120},100%,50%)`;
  ctx.fillRect(-bw/2, -40, bw*(boss.hp/boss.maxHp), 8);
  ctx.strokeStyle = '#fff'; ctx.lineWidth=1;
  ctx.strokeRect(-bw/2, -40, bw, 8);
  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 4*p.life, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = 'white'; ctx.font = 'bold 16px Arial';
  ctx.fillText('Score: ' + score, 10, 24);
  ctx.fillText('Level ' + level, W/2 - 28, 24);
  ctx.font = '20px serif';
  for (let i = 0; i < lives; i++) ctx.fillText('❤️', W - 30 - i*28, 24);
  if (upgrades.shield && shieldHP > 0) {
    ctx.fillStyle = '#00ccff'; ctx.font = '13px Arial';
    ctx.fillText('Shield: ' + shieldHP, 10, 44);
  }
  const activeUps = Object.entries(upgrades).filter(([k,v])=>v && k!=='bomb').map(([k])=>k);
  if (activeUps.length) {
    ctx.fillStyle = '#ffcc00'; ctx.font = '12px Arial';
    ctx.fillText('⚡ ' + activeUps.join(' · '), 10, H-10);
  }
}

function drawIntro() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawStars();
  ctx.save();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ff4400';
  ctx.font = 'bold 38px Arial';
  ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 20;
  ctx.fillText('SPACE DEFENDER', W/2, 140);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ffaa00';
  ctx.font = 'bold 16px Arial';
  ctx.fillText('— HOW TO PLAY —', W/2, 200);
  ctx.fillStyle = 'white'; ctx.font = '15px Arial';
  const lines = [
    '🚀  Arrow keys — move your ship',
    '🔫  Spacebar — shoot',
    '💥  Destroy asteroids & aliens',
    '👾  Every 5 levels — face a BOSS',
    '⬆️   Survive waves to level up',
    '🎁  Choose upgrades between levels',
  ];
  lines.forEach((l,i) => ctx.fillText(l, W/2, 250 + i*34));
  ctx.fillStyle = '#00ffcc';
  ctx.font = `bold ${16 + Math.sin(frame*0.06)*2}px Arial`;
  ctx.fillText('PRESS SPACE TO START', W/2, H-60);
  ctx.restore();
}

function drawLevelUp() {
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 30px Arial';
  ctx.fillText('LEVEL ' + level + ' COMPLETE!', W/2, 100);
  ctx.fillStyle = 'white'; ctx.font = '16px Arial';
  ctx.fillText('Choose your upgrade:', W/2, 140);
  upgradeOptions.forEach((u, i) => {
    const bx = W/2 - 130, by = 170 + i*110, bw2 = 260, bh = 90;
    ctx.fillStyle = '#111';
    ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect(bx, by, bw2, bh, 10);
    ctx.fill(); ctx.stroke();
    ctx.font = '28px serif'; ctx.fillText(u.icon, W/2 - 90, by+52);
    ctx.fillStyle = '#ffcc00'; ctx.font = 'bold 16px Arial';
    ctx.fillText(`[${i+1}]  ${u.label}`, W/2 + 10, by+38);
    ctx.fillStyle = '#aaa'; ctx.font = '13px Arial';
    ctx.fillText(u.desc, W/2 + 10, by+62);
  });
  ctx.restore();
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);
  ctx.save(); ctx.textAlign = 'center';
  ctx.fillStyle = '#ff3300'; ctx.font = 'bold 44px Arial';
  ctx.shadowColor = '#ff3300'; ctx.shadowBlur = 20;
  ctx.fillText('GAME OVER', W/2, H/2 - 60);
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'white'; ctx.font = '22px Arial';
  ctx.fillText('Final Score: ' + score, W/2, H/2);
  ctx.fillText('Level Reached: ' + level, W/2, H/2 + 36);
  ctx.fillStyle = '#00ffcc'; ctx.font = `bold ${15+Math.sin(frame*0.06)*2}px Arial`;
  ctx.fillText('PRESS SPACE TO PLAY AGAIN', W/2, H/2 + 100);
  ctx.restore();
}

// MAIN LOOP
function update() {
  frame++;
  if (state === 'intro' || state === 'levelup' || state === 'gameover') return;

  // move ship
  const spd = ship.speed;
  if (keys['ArrowLeft']) ship.x = Math.max(22, ship.x - spd);
  if (keys['ArrowRight']) ship.x = Math.min(W-22, ship.x + spd);
  if (keys['ArrowUp']) ship.y = Math.max(40, ship.y - spd);
  if (keys['ArrowDown']) ship.y = Math.min(H-20, ship.y + spd);
  if (keys[' ']) tryShoot();
  if (ship.shootCooldown > 0) ship.shootCooldown--;

  // bullets
  bullets = bullets.filter(b => b.y > -10 && b.x > -10 && b.x < W+10);
  bullets.forEach(b => { b.x += b.dx; b.y += b.dy; });

  // alien bullets
  alienBullets = alienBullets.filter(b => b.y < H+10);
  alienBullets.forEach(b => { b.x += b.dx; b.y += b.dy; });

  // asteroids
  asteroids.forEach(a => {
    a.x += a.dx; a.y += a.dy; a.rot += a.rotSpeed;
    if (a.x < a.r || a.x > W-a.r) a.dx *= -1;
  });
  asteroids = asteroids.filter(a => a.y < H + 60);

  // aliens movement
  let edgeHit = false;
  aliens.forEach(a => { a.x += a.dx; if (a.x > W-20 || a.x < 20) edgeHit = true; });
  if (edgeHit) { aliens.forEach(a => { a.dx *= -1; a.y += 20; }); }
  aliens.forEach(a => {
    a.shootTimer--;
    if (a.shootTimer <= 0) {
      alienBullets.push({ x: a.x, y: a.y+15, dx: (Math.random()-0.5)*2, dy: 3+level*0.3 });
      a.shootTimer = 80 + Math.random()*80;
      alienShootSound();
    }
  });

  // boss
  if (boss) {
    boss.x += boss.dx;
    if (boss.x > W-50 || boss.x < 50) boss.dx *= -1;
    boss.shootTimer++;
    if (boss.shootTimer % 40 === 0) {
      for (let a = -1; a <= 1; a++) {
        alienBullets.push({ x: boss.x + a*20, y: boss.y+30, dx: a*2, dy: 4+level*0.3 });
      }
      alienShootSound();
    }
  }

  // bullet vs asteroid
  bullets.forEach((b, bi) => {
    asteroids.forEach((a, ai) => {
      if (Math.hypot(b.x-a.x, b.y-a.y) < a.r) {
        a.hp--;
        bullets.splice(bi, 1);
        spawnParticles(a.x, a.y, '#ff8833');
        if (a.hp <= 0) {
          explosionSound();
          score += 10 * level;
          asteroids.splice(ai, 1);
          spawnParticles(a.x, a.y, '#ffaa55', 20);
        }
      }
    });
  });

  // bullet vs alien
  bullets.forEach((b, bi) => {
    aliens.forEach((a, ai) => {
      if (Math.abs(b.x-a.x)<18 && Math.abs(b.y-a.y)<14) {
        bullets.splice(bi, 1);
        aliens.splice(ai, 1);
        score += 20 * level;
        explosionSound();
        spawnParticles(a.x, a.y, '#44ff88', 18);
      }
    });
  });

  // bullet vs boss
  if (boss) {
    bullets.forEach((b, bi) => {
      if (Math.abs(b.x-boss.x)<38 && Math.abs(b.y-boss.y)<26) {
        bullets.splice(bi, 1);
        boss.hp--;
        spawnParticles(boss.x+(Math.random()-0.5)*40, boss.y+(Math.random()-0.5)*20, '#ff4400');
        shake = 4;
        if (boss.hp <= 0) {
          score += 200 * level;
          explosionSound();
          setTimeout(explosionSound, 150);
          setTimeout(explosionSound, 300);
          spawnParticles(boss.x, boss.y, '#ff4400', 50);
          boss = null;
        }
      }
    });
  }

  // alien bullet vs ship
  alienBullets.forEach((b, bi) => {
    if (Math.hypot(b.x-ship.x, b.y-ship.y) < 20) {
      alienBullets.splice(bi, 1);
      if (upgrades.shield && shieldHP > 0) {
        shieldHP--; hitSound(); shake = 6;
        if (shieldHP === 0) upgrades.shield = false;
      } else {
        lives--; hitSound(); shake = 12;
        spawnParticles(ship.x, ship.y, '#ff4400', 20);
        if (lives <= 0) { state = 'gameover'; explosionSound(); }
      }
    }
  });

  // asteroid vs ship
  asteroids.forEach((a, ai) => {
    if (Math.hypot(a.x-ship.x, a.y-ship.y) < a.r + 16) {
      asteroids.splice(ai, 1);
      if (upgrades.shield && shieldHP > 0) {
        shieldHP--; hitSound(); shake = 8;
        if (shieldHP === 0) upgrades.shield = false;
      } else {
        lives--; hitSound(); shake = 14;
        spawnParticles(ship.x, ship.y, '#ff4400', 25);
        if (lives <= 0) { state = 'gameover'; explosionSound(); }
      }
    }
  });

  // particles
  particles.forEach(p => { p.x+=p.dx; p.y+=p.dy; p.life-=0.03; p.dx*=0.95; p.dy*=0.95; });
  particles = particles.filter(p => p.life > 0);
  if (shake > 0) shake--;

  // wave clear check
  const waveCleared = asteroids.length===0 && aliens.length===0 && !boss;
  if (waveCleared) {
    level++;
    upgradeOptions = getUpgradeOptions();
    state = 'levelup';
  }
}

function render() {
  ctx.save();
  if (shake > 0) ctx.translate((Math.random()-0.5)*shake, (Math.random()-0.5)*shake);

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (state === 'intro') { drawIntro(); ctx.restore(); return; }
  if (state === 'gameover') { drawGameOver(); ctx.restore(); return; }

  // bullets
  bullets.forEach(b => {
    ctx.fillStyle = '#00ffff';
    ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 8;
    ctx.fillRect(b.x-2, b.y-8, 4, 16);
    ctx.shadowBlur = 0;
  });

  // alien bullets
  alienBullets.forEach(b => {
    ctx.fillStyle = '#ff4400';
    ctx.shadowColor = '#ff4400'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  asteroids.forEach(drawAsteroid);
  aliens.forEach(drawAlien);
  drawBoss();
  drawShip();
  drawParticles();
  drawHUD();

  if (state === 'levelup') drawLevelUp();

  ctx.restore();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

spawnStars();
introMusic();
loop();
</script>
</body>
</html>
